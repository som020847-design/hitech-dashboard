<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>HI-TECH ECO ENERGY — Solar Monitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="ระบบมอนิเตอร์พลังงานโซลาร์แบบเรียลไทม์ของ Hi-Tech Eco Energy ดูกำลังผลิต สถานะ และแจ้งเตือนของทุกไซต์ในเครือได้ในหน้าเดียว">
<meta property="og:title" content="HI-TECH ECO ENERGY — Solar Monitoring">
<meta property="og:description" content="ระบบมอนิเตอร์พลังงานโซลาร์แบบเรียลไทม์ — ดูกำลังผลิต สถานะ และแจ้งเตือนของทุกไซต์ในเครือได้ในหน้าเดียว">
<meta property="og:type" content="website">
<style>
  :root{
    --bg:#ef582c;
    --panel:#ffffff;
    --ink:#1c1c1e;
    --sub:#8a8a8e;
    --line:#f1e9d8;
    --orange:#ff7a1a;
    --orange-deep:#e85d04;
    --yellow:#f5a23e;
    --yellow-soft:#fdead2;
    --amber-soft:#fff1de;
    --ok:#2fb35d;
    --ok-soft:#e6f7ec;
    --issue:#ff4d3d;
    --issue-soft:#ffe9e5;
    --stale:#9a9a9e;
    --stale-soft:#f2f0eb;
    --v-huawei:#ff7a1a;
    --v-deye:#ffab00;
    --v-sigen:#e85d04;
    --header-ink:#ffffff;
    --header-sub:rgba(255,255,255,.88);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI","Noto Sans Thai",sans-serif;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Header ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 34px 16px;
    flex-shrink:0;
  }
  .brand{display:flex;align-items:center;gap:14px;}
  .brand img.logo{
    height:44px;width:auto;display:block;flex-shrink:0;
  }
  .brand h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px;color:var(--header-ink);}
  .brand span{font-size:12px;color:var(--header-sub);display:block;margin-top:2px;font-weight:500;}
  .header-right{display:flex;align-items:center;gap:16px;position:relative;}
  #clock{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;text-align:right;color:var(--header-ink);}
  #clock small{display:block;font-size:11px;font-weight:500;color:var(--header-sub);margin-top:1px;}
  #pauseBtn{
    border:none;
    background:rgba(255,255,255,.22);
    color:#fff;
    padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:6px;
    box-shadow:0 4px 12px rgba(0,0,0,.12);
    transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
  }
  #pauseBtn:hover{transform:translateY(-1px);background:rgba(255,255,255,.32);}

  /* ---------- Search button + dropdown ---------- */
  #searchToggleBtn{
    border:none;background:rgba(255,255,255,.22);color:#fff;
    width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:16px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    transition:background .12s ease;
  }
  #searchToggleBtn:hover{background:rgba(255,255,255,.32);}
  #searchBar{
    position:absolute;top:calc(100% + 10px);right:0;
    display:none;align-items:center;gap:10px;
    width:300px;max-width:calc(100vw - 40px);
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 16px;
    box-shadow:0 12px 30px rgba(40,20,0,.18);
    z-index:40;
  }
  #searchBar.show{display:flex;}
  #searchIcon{font-size:14px;opacity:.6;flex-shrink:0;}
  #searchInput{
    flex:1;border:none;outline:none;background:transparent;
    font-family:inherit;font-size:14px;color:var(--ink);
  }
  #searchInput::placeholder{color:var(--sub);}
  #searchClear{
    border:none;background:var(--stale-soft);color:var(--sub);
    width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:11px;flex-shrink:0;
  }
  #searchClear:hover{background:var(--line);}
  #searchNoResults{
    display:none;flex:1;align-items:center;justify-content:center;
    color:var(--header-sub);font-size:14px;padding:40px;
  }

  /* ---------- Ribbon ---------- */
  #ribbon{
    flex-shrink:0;
    background:#e13a26;
    color:#fff;
    display:none;
    align-items:center;
    margin:0 0 10px;
    padding:11px 34px;
    font-size:13.5px;
    font-weight:600;
    overflow:hidden;
    white-space:nowrap;
    box-shadow:0 4px 14px rgba(0,0,0,.15);
  }
  #ribbon.show{display:flex;}
  #ribbonTrack{display:inline-flex;gap:30px;animation:scroll 22s linear infinite;}
  #ribbonTrack span{cursor:pointer;text-decoration:underline;text-decoration-color:rgba(255,255,255,.45);text-underline-offset:3px;}
  #ribbonTrack span:hover{text-decoration-color:#fff;}
  @keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}

  /* ---------- Main grid ---------- */
  main{
    flex:1;
    padding:14px 34px 6px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    grid-auto-rows:1fr;
    gap:16px;
    overflow:hidden;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:20px;
    padding:16px 16px 13px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    box-shadow:0 1px 2px rgba(30,20,0,.03), 0 8px 18px rgba(30,20,0,.02);
    position:relative;
    overflow:hidden;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 26px rgba(30,20,0,.09);
  }
  .card.issue{
    border-color:#ffcec5;
    animation:pulse 2s ease-in-out infinite;
  }
  .card.warning{
    border-color:#ffe1a0;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(255,77,61,.28);}
    50%{box-shadow:0 0 0 8px rgba(255,77,61,0);}
  }
  .card.muted{opacity:1;}
  .vendor-dot{
    position:absolute;top:16px;right:16px;width:8px;height:8px;border-radius:50%;
  }
  .vendor-dot.Huawei{background:var(--v-huawei);}
  .vendor-dot.Deye{background:var(--v-deye);}
  .vendor-dot.Sigen{background:var(--v-sigen);}

  .card-top{padding-right:16px;}
  .site-name{
    font-size:15px;font-weight:700;line-height:1.28;color:var(--ink);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .vendor-label{font-size:11px;font-weight:600;color:var(--sub);margin-top:3px;}

  .stats{display:flex;gap:10px;margin-top:10px;}
  .stat{
    flex:1;background:var(--amber-soft);border-radius:14px;
    padding:11px 8px;text-align:center;
    min-width:0;
  }
  .stat .val{
    font-size:17px;font-weight:800;color:#7a4400;font-variant-numeric:tabular-nums;
    white-space:nowrap;line-height:1.15;
  }
  .stat .lbl{font-size:10px;color:#a8752e;margin-top:3px;font-weight:600;line-height:1.3;}
  .stat .lbl .unit{font-weight:500;opacity:.85;}
  .card.issue .stat .lbl .unit{opacity:.85;}
  .card.issue .stat{background:var(--issue-soft);}
  .card.issue .stat .val{color:#a8281c;}
  .card.issue .stat .lbl{color:#c14d40;}
  .card.warning .stat{background:var(--yellow-soft);}
  .card.warning .stat .val{color:#8a6100;}
  .card.warning .stat .lbl{color:#a37a1e;}

  .stats.stats-3 .stat .val{font-size:14.5px;}
  .stats.stats-3 .stat{padding:10px 6px;}

  .card-bottom{
    display:flex;justify-content:space-between;align-items:center;margin-top:10px;
  }
  .status-pill{
    font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;
    display:flex;align-items:center;gap:5px;
  }
  .status-pill .dot{width:7px;height:7px;border-radius:50%;}
  .status-pill.ok{background:var(--ok-soft);color:#186b38;}
  .status-pill.ok .dot{background:var(--ok);}
  .status-pill.issue{background:var(--issue-soft);color:#a8281c;}
  .status-pill.issue .dot{background:var(--issue);}
  .status-pill.warning{background:var(--yellow-soft);color:#8a6100;}
  .status-pill.warning .dot{background:var(--yellow);}
  .status-pill.stale{background:var(--stale-soft);color:#6b6b6f;}
  .status-pill.stale .dot{background:var(--stale);}
  .updated{font-size:10px;color:var(--sub);font-weight:500;}

  /* ---------- Footer ---------- */
  footer{
    flex-shrink:0;
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 34px 20px;
  }
  .totals{display:flex;gap:24px;font-size:12px;color:var(--header-sub);font-weight:500;}
  .totals b{color:var(--header-ink);font-size:14px;font-weight:700;}
  .dots{display:flex;gap:7px;}
  .dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.35);transition:.25s;cursor:pointer;}
  .dots span.active{background:#fff;width:22px;border-radius:5px;}

  #loading, #errorBox{
    flex:1;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:10px;color:var(--header-sub);font-size:15px;text-align:center;padding:0 40px;
  }
  #errorBox{display:none;color:#fff;}
  #errorBox code{background:rgba(255,255,255,.25);padding:2px 6px;border-radius:6px;font-size:13px;}

  /* ---------- Detail modal ---------- */
  #modalOverlay{
    display:none;position:fixed;inset:0;background:rgba(30,22,10,.45);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    z-index:50;align-items:center;justify-content:center;padding:30px;
  }
  #modalOverlay.show{display:flex;}
  #modalBox{
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-radius:24px;max-width:680px;width:100%;
    max-height:86vh;overflow-y:auto;padding:28px 30px;position:relative;
    box-shadow:0 24px 60px rgba(40,25,0,.25);
    border:1px solid rgba(255,255,255,.6);
  }
  #modalClose{
    position:absolute;top:18px;right:18px;background:var(--stale-soft);border:none;
    width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;color:var(--sub);
    transition:background .12s ease;
  }
  #modalClose:hover{background:var(--line);}
  .modal-header{display:flex;align-items:center;gap:10px;margin-bottom:4px;padding-right:40px;}
  .modal-header h2{font-size:20px;margin:0;font-weight:800;}
  .vendor-chip{
    font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:999px;color:#fff;flex-shrink:0;
  }
  .vendor-chip.Huawei{background:var(--v-huawei);}
  .vendor-chip.Deye{background:var(--v-deye);}
  .vendor-chip.Sigen{background:var(--v-sigen);}
  .modal-sub{font-size:12px;color:var(--sub);margin-bottom:18px;font-weight:500;}
  .modal-stats{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:6px;}
  .modal-stats .stat{flex:1 1 130px;}
  .modal-section-title{font-size:12px;font-weight:700;color:var(--sub);margin:20px 0 8px;text-transform:uppercase;letter-spacing:.5px;}
  .detail-rows{display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:14px;overflow:hidden;}
  .detail-row{
    display:flex;justify-content:space-between;padding:11px 14px;background:var(--panel);font-size:13px;
  }
  .detail-row .k{color:var(--sub);font-weight:500;}
  .detail-row .v{font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}
  .device-card{
    background:var(--amber-soft);border-radius:14px;padding:12px 14px;margin-bottom:8px;font-size:12.5px;
  }
  .device-card .dname{font-weight:700;color:#7a4400;margin-bottom:5px;font-size:13px;}
  .device-card .drow{display:flex;justify-content:space-between;color:#8a6224;padding:2px 0;}
  .device-card .drow b{color:#5c4114;}
  .alarm-card{
    background:var(--issue-soft);border-radius:14px;padding:14px 16px;margin-bottom:10px;
  }
  .alarm-card .aname{font-weight:700;color:#a8281c;font-size:14px;margin-bottom:4px;}
  .alarm-card .arow{font-size:12px;color:#7a3a30;margin-top:6px;line-height:1.5;}
  .alarm-card .arow b{color:#5c2a20;}
  .no-alarm-note{
    background:var(--ok-soft);color:#186b38;border-radius:14px;padding:14px 16px;font-size:13px;font-weight:500;
  }
  .heuristic-note{
    background:var(--stale-soft);color:#6b6b6f;border-radius:14px;padding:12px 14px;font-size:11.5px;margin-top:10px;line-height:1.5;
  }

  /* ---------- Mobile ---------- */
  @media (max-width:700px){
    body{overflow-y:auto;height:auto;min-height:100vh;}
    header{flex-direction:row;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;}
    .brand{gap:8px;}
    .brand img.logo{height:32px;}
    .brand h1{font-size:14.5px;line-height:1.25;}
    .brand span{display:none;}
    .header-right{width:auto;justify-content:flex-end;}
    #clock{font-size:12.5px;text-align:right;}
    #clock small{font-size:9px;}
    #pauseBtn{display:none;}
    #ribbon{margin:0 0 8px;padding:9px 16px;font-size:12px;}
    #searchBar{right:0;width:260px;}
    #loading,#errorBox{padding:40px 24px;font-size:14px;text-align:center;}
    main{
      grid-template-columns:repeat(2,1fr);
      grid-auto-rows:auto;
      padding:6px 18px 12px;
      overflow:visible;
      gap:12px;
    }
    .card{padding:14px 14px 12px;}
    .card:hover{transform:none;}
    .site-name{font-size:14px;}
    .vendor-label{font-size:10px;}
    .stats{gap:8px;}
    .stat{padding:9px 6px;}
    .stat .val{font-size:15px;}
    .stat .lbl{font-size:9px;}
    .stats.stats-3 .stat .val{font-size:12.5px;}
    .status-pill{font-size:10px;padding:4px 8px;}
    .updated{font-size:9px;}
    footer{flex-direction:column;align-items:flex-start;gap:10px;padding:14px 18px 26px;}
    .totals{flex-wrap:wrap;gap:12px 18px;}
    .dots{display:none;}
    #modalOverlay{padding:14px;}
    #modalBox{padding:22px 18px;max-height:92vh;border-radius:20px;}
    .modal-header h2{font-size:17px;}
    .modal-stats .stat{flex:1 1 100px;}
  }
</style>
</head>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const SHEET_ID = "1zz5nbLT4SjKFHYWsrsR8TvVpGjgNuOLQHRDe_3ltNNU";
const PAGE_SIZE = 10;
const ROTATE_MS = 30000;
const DATA_REFRESH_MS = 5 * 60000;
const STALE_MIN = 35;
const DAY_START_HOUR = 6;
const DAY_END_HOUR = 18;

function gvizUrl(sheetName){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
}

/* ============================================================
   CSV PARSER
   ============================================================ */
function parseCSV(text){
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], n = text[i+1];
    if(inQuotes){
      if(c === '"' && n === '"'){ field += '"'; i++; }
      else if(c === '"'){ inQuotes = false; }
      else{ field += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field=""; }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=""; }
      else if(c === '\r'){ /* skip */ }
      else{ field += c; }
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  if(!rows.length) return [];
  const headers = rows[0].map(h=>h.trim());
  return rows.slice(1).filter(r=>r.length>1 || r[0]!=="").map(r=>{
    const o = {};
    headers.forEach((h,idx)=> o[h] = (r[idx]!==undefined ? r[idx].trim() : ""));
    return o;
  });
}

async function fetchSheet(sheetName){
  const res = await fetch(gvizUrl(sheetName));
  if(!res.ok) throw new Error(`โหลด ${sheetName} ไม่สำเร็จ (${res.status})`);
  const text = await res.text();
  return parseCSV(text);
}

function num(v){
  if(v === undefined || v === null || v === "") return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}

function latestByKey(rows, keyField){
  const map = new Map();
  for(const r of rows){
    if(!r[keyField]) continue;
    map.set(r[keyField], r);
  }
  return [...map.values()];
}

function parseTimestamp(s){
  if(!s) return null;
  const d = new Date(s.replace(" ", "T"));
  return isNaN(d.getTime()) ? null : d;
}

/* ============================================================
   โหลดและรวมข้อมูลทุกแหล่ง
   ============================================================ */
async function loadAllSites(){
  const [
    huaweiLatest, huaweiStations, huaweiAlarmsRaw,
    deyeAll, deyeStations, deyeDeviceStatus, deyeAlertsRaw, deyeDailyEnergy,
    sigenInvAll, sigenRealtimeAll, sigenStations
  ] = await Promise.all([
    fetchSheet("Latest_Data"),
    fetchSheet("Station_List").catch(()=>[]),
    fetchSheet("Huawei_Alarms").catch(() => []),
    fetchSheet("Deye_Realtime_Data"),
    fetchSheet("Deye_Station_List").catch(()=>[]),
    fetchSheet("Deye_Device_Status").catch(()=>[]),
    fetchSheet("Deye_Alerts").catch(()=>[]),
    fetchSheet("Deye_Daily_Energy").catch(()=>[]),
    fetchSheet("Sigen_Inverter_Data"),
    fetchSheet("Sigen_Realtime_Data").catch(()=>[]),
    fetchSheet("Sigen_Station_List").catch(()=>[])
  ]);

  // ---- capacity lookup maps ----
  const huaweiCapMap = new Map(huaweiStations.map(r => [r.stationCode, num(r["capacity (kW)"])]));
  const deyeCapMap = new Map(deyeStations.map(r => [r.stationId, num(r.capacity_kW)]));
  const sigenCapMap = new Map(sigenStations.map(r => [r.systemId, {
    pv: num(r.pv_capacity_kW), battery: num(r.battery_capacity)
  }]));

  // ---- Huawei active alarms (latest polling batch, full detail) ----
  let latestHuaweiAlarmMap = new Map();
  if (huaweiAlarmsRaw.length){
    const times = huaweiAlarmsRaw.map(r => parseTimestamp(r.timestamp_polled)).filter(Boolean);
    if (times.length){
      const latestTime = Math.max(...times.map(d => d.getTime()));
      const latestStr = huaweiAlarmsRaw.find(r => {
        const t = parseTimestamp(r.timestamp_polled);
        return t && t.getTime() === latestTime;
      })?.timestamp_polled;

      huaweiAlarmsRaw
        .filter(r => r.timestamp_polled === latestStr)
        .forEach(r => {
          const key = r.stationCode;
          if (!key) return;
          if (!latestHuaweiAlarmMap.has(key)) latestHuaweiAlarmMap.set(key, []);
          latestHuaweiAlarmMap.get(key).push({
            name: r.alarmName || "Alarm",
            device: r.deviceName || "",
            severity: r.alarmSeverity || "",
            occurTime: r.occurTime || "",
            cause: r.raw_json ? tryExtractCause(r.raw_json) : ""
          });
        });
    }
  }
  function tryExtractCause(raw){
    try{
      const m = raw.match(/"alarmCause"\s*:\s*"([^"]*)"/);
      return m ? m[1] : "";
    }catch(e){ return ""; }
  }

  // ---- Deye: latest daily energy / self-use savings snapshot per station ----
  const deyeDailyLatest = latestByKey(deyeDailyEnergy, "stationId");
  const deyeDailyMap = new Map(deyeDailyLatest.map(r => [r.stationId, r]));

  // ---- Deye: history of active power per station (to detect *sustained* zero, not momentary) ----
  const deyeHistoryMap = new Map();
  for(const r of deyeAll){
    if(!r.stationId) continue;
    const t = parseTimestamp(r.timestamp);
    if(!t) continue;
    if(!deyeHistoryMap.has(r.stationId)) deyeHistoryMap.set(r.stationId, []);
    deyeHistoryMap.get(r.stationId).push({t:t.getTime(), val:num(r.active_power_kW)});
  }
  for(const arr of deyeHistoryMap.values()) arr.sort((a,b)=>a.t-b.t);

  // ---- Deye: per-device connectStatus (real connectivity signal, same as Deye Cloud's own
  // Online / Partially Offline / Offline classification) grouped by stationId ----
  const deyeDeviceMap = new Map();
  for(const r of deyeDeviceStatus){
    if(!r.stationId) continue;
    if(!deyeDeviceMap.has(r.stationId)) deyeDeviceMap.set(r.stationId, []);
    deyeDeviceMap.get(r.stationId).push({
      type: r.deviceType || "Device",
      sn: r.deviceSn || "",
      connected: String(r.connectStatus) === "1",
      lastSeen: r.collectionTime || ""
    });
  }

  // ---- Deye: real active alerts from /station/alertList (latest polling batch only) ----
  let latestDeyeAlertMap = new Map();
  if (deyeAlertsRaw.length){
    const times = deyeAlertsRaw.map(r => parseTimestamp(r.timestamp_polled)).filter(Boolean);
    if (times.length){
      const latestTime = Math.max(...times.map(d => d.getTime()));
      const latestStr = deyeAlertsRaw.find(r => {
        const t = parseTimestamp(r.timestamp_polled);
        return t && t.getTime() === latestTime;
      })?.timestamp_polled;

      deyeAlertsRaw
        .filter(r => r.timestamp_polled === latestStr && r.stationId)
        .forEach(r => {
          if (!latestDeyeAlertMap.has(r.stationId)) latestDeyeAlertMap.set(r.stationId, []);
          latestDeyeAlertMap.get(r.stationId).push({
            name: r.alertName || "Alert",
            deviceType: r.deviceType || "",
            impact: String(r.impact) === "1",
            level: r.level || "",
            startTime: r.alertStartTime || ""
          });
        });
    }
  }

  // ---- Sigen: history of total PV power per system (sum of devices at each timestamp) ----
  const sigenTsPower = new Map();
  for(const r of sigenInvAll){
    if(!r.systemId || !r.timestamp) continue;
    const t = parseTimestamp(r.timestamp);
    if(!t) continue;
    if(!sigenTsPower.has(r.systemId)) sigenTsPower.set(r.systemId, new Map());
    const m = sigenTsPower.get(r.systemId);
    const tk = t.getTime();
    m.set(tk, (m.get(tk)||0) + (num(r.pv_power_kW) || 0));
  }
  const sigenHistoryMap = new Map();
  for(const [key, m] of sigenTsPower){
    sigenHistoryMap.set(key, [...m.entries()].map(([t,val])=>({t,val})).sort((a,b)=>a.t-b.t));
  }

  const sites = [];

  // ---- Huawei ----
  for(const r of huaweiLatest){
    if(!r.stationCode) continue;
    sites.push({
      vendor:"Huawei",
      id:r.stationCode,
      name:r.stationName || r.stationCode,
      lastUpdated:parseTimestamp(r.timestamp),
      activeAlarms: latestHuaweiAlarmMap.get(r.stationCode) || [],
      capacityKw: huaweiCapMap.get(r.stationCode) ?? null,
      rawStatus: r.status || "",
      metrics:{
        dayPower: num(r.day_power),
        monthPower: num(r.month_power),
        totalPower: num(r.total_power),
        dayUse: num(r.day_use),
        dayGrid: num(r.day_grid),
        dayIncome: num(r.day_income),
        totalIncome: num(r.total_income),
        savedCost: num(r.saved_cost)
      },
      livePowerKw:null
    });
  }

  // ---- Deye ----
  const deyeLatest = latestByKey(deyeAll, "stationId");
  for(const r of deyeLatest){
    sites.push({
      vendor:"Deye",
      id:r.stationId,
      name:r.stationName || r.stationId,
      lastUpdated:parseTimestamp(r.timestamp),
      activeAlarms: [],
      capacityKw: deyeCapMap.get(r.stationId) ?? null,
      livePowerKw: num(r.active_power_kW),
      powerHistory: deyeHistoryMap.get(r.stationId) || [],
      deviceStatusList: deyeDeviceMap.get(r.stationId) || [],
      deviceAlerts: latestDeyeAlertMap.get(r.stationId) || [],
      metrics:{
        activePower: num(r.active_power_kW),
        consumptionPower: num(r.consumption_power_kW),
        wirePower: num(r.wire_power_kW),
        batteryPower: num(r.battery_power_kW),
        batterySoc: num(r.battery_soc_pct),
        dayGeneration: num((deyeDailyMap.get(r.stationId)||{}).day_generation_kWh),
        daySelfUse: num((deyeDailyMap.get(r.stationId)||{}).day_self_use_kWh),
        dayPurchase: num((deyeDailyMap.get(r.stationId)||{}).day_purchase_kWh),
        dayGrid: num((deyeDailyMap.get(r.stationId)||{}).day_grid_kWh),
        savedCost: num((deyeDailyMap.get(r.stationId)||{}).saved_cost)
      }
    });
  }

  // ---- Sigen: aggregate live power across devices per systemId ----
  const sigenRealtimeLatest = latestByKey(sigenRealtimeAll, "systemId");
  const sigenRealtimeMap = new Map(sigenRealtimeLatest.map(r => [r.systemId, r]));

  const bySystem = new Map();
  for(const r of sigenInvAll){
    if(!r.systemId) continue;
    const key = r.systemId;
    if(!bySystem.has(key)){
      bySystem.set(key, {
        vendor:"Sigen", id:key, name:r.systemName || key,
        livePowerKw:0, lastUpdated:null, activeAlarms: [], devices:[],
        capacityKw: (sigenCapMap.get(key)||{}).pv ?? null,
        powerHistory: sigenHistoryMap.get(key) || [],
        metrics:{}
      });
    }
    const s = bySystem.get(key);
    const p = num(r.pv_power_kW);
    if(p !== null) s.livePowerKw += p;
    const t = parseTimestamp(r.timestamp);
    if(t && (!s.lastUpdated || t > s.lastUpdated)) s.lastUpdated = t;
    s.devices.push({
      type:r.deviceType || "Device",
      status:r.status || "",
      activePower:num(r.active_power_kW),
      pvPower:num(r.pv_power_kW),
      reactivePower:num(r.reactive_power_kW),
      powerFactor:num(r.power_factor),
      gridFreq:num(r.grid_frequency_Hz),
      temp:num(r.internal_temperature_C)
    });
  }
  for(const [key, s] of bySystem){
    const rt = sigenRealtimeMap.get(key);
    if(rt){
      s.metrics = {
        dayEnergy: num(rt.daily_power_generation_kWh),
        monthEnergy: num(rt.monthly_power_generation),
        annualEnergy: num(rt.annual_power_generation),
        lifetimeEnergy: num(rt.lifetime_power_generation),
        lifetimeCo2: num(rt.lifetime_co2_ton),
        lifetimeTree: num(rt.lifetime_tree_equivalent),
        savedCost: num(rt.saved_cost)
      };
    }
    const cap = sigenCapMap.get(key) || {};
    s.batteryCapacityKw = cap.battery ?? null;
    sites.push(s);
  }

  return sites;
}

/* ============================================================
   ตัดสิน "ปัญหา"
   ============================================================ */
function sustainedZero(history, thresholdKw=0.05, minGapMin=10, maxGapMin=45){
  if(!history || history.length < 2) return false; // not enough history yet — don't alarm prematurely
  const last = history[history.length-1];
  const prev = history[history.length-2];
  if(last.val === null || prev.val === null) return false;
  if(last.val >= thresholdKw || prev.val >= thresholdKw) return false;
  const gapMin = (last.t - prev.t) / 60000;
  if(gapMin < minGapMin || gapMin > maxGapMin) return false;
  return true;
}

// states: "ok" | "fault" (confirmed device/vendor fault) | "offline" (no/stale data or comms alarm) | "issue" (uncertain heuristic — Deye/Sigen zero-power guess)
function evaluate(site){
  const now = new Date();
  const hour = now.getHours();
  const isDaytime = hour >= DAY_START_HOUR && hour < DAY_END_HOUR;

  if(!site.lastUpdated){
    return {state:"offline", reason:"ไม่มีข้อมูล"};
  }
  const ageMin = (now - site.lastUpdated) / 60000;
  if(ageMin > STALE_MIN){
    return {state:"offline", reason:`ข้อมูลล่าช้า ${Math.round(ageMin)} นาที`};
  }

  if(site.vendor === "Huawei"){
    if(site.activeAlarms && site.activeAlarms.length){
      const names = site.activeAlarms.map(a=>a.name).join(", ");
      const isOfflineType = site.activeAlarms.some(a => /connection|communication|network|offline|disconnect/i.test(a.name||""));
      return {state: isOfflineType ? "offline" : "fault", reason:names};
    }
    return {state:"ok", reason:""};
  }

  const raw = (site.devices ? site.devices.map(d=>d.status).join(" ") : (site.metrics.status||"")).toLowerCase();
  if(raw.includes("fault") || raw.includes("alarm")){
    return {state:"fault", reason:"สถานะผิดปกติ"};
  }

  // Deye: real active alerts from station/alertList (most authoritative signal we have)
  if(site.vendor === "Deye" && site.deviceAlerts && site.deviceAlerts.length){
    const faultAlerts = site.deviceAlerts.filter(a => a.impact);
    if(faultAlerts.length){
      return {state:"fault", reason: faultAlerts.map(a=>a.name).join(", ")};
    }
    return {state:"warning", reason: site.deviceAlerts.map(a=>a.name).join(", ")};
  }

  // Deye: real per-device connectStatus (matches Deye Cloud's own Online/Partially Offline/Offline)
  if(site.vendor === "Deye" && site.deviceStatusList && site.deviceStatusList.length){
    const total = site.deviceStatusList.length;
    const connected = site.deviceStatusList.filter(d => d.connected).length;
    if(connected === 0){
      return {state:"offline", reason:"อุปกรณ์ทั้งหมดขาดการเชื่อมต่อ (Offline)"};
    }
    if(connected < total){
      const names = site.deviceStatusList.filter(d=>!d.connected).map(d=>d.type).join(", ");
      return {state:"partial", reason:`${names} ขาดการเชื่อมต่อ (${connected}/${total} เชื่อมต่ออยู่)`};
    }
  }

  if(isDaytime && sustainedZero(site.powerHistory)){
    return {state:"issue", reason:"กำลังไฟฟ้าเป็น 0 ต่อเนื่องเกิน 15 นาที"};
  }
  return {state:"ok", reason:""};
}

function pillInfo(ev){
  if(ev.state === "ok") return {cls:"ok", text:"ปกติ"};
  if(ev.state === "fault") return {cls:"issue", text:"ผิดพลาด"};
  if(ev.state === "issue") return {cls:"issue", text:"ต้องตรวจสอบ"};
  if(ev.state === "warning") return {cls:"warning", text:"แจ้งเตือน"};
  if(ev.state === "partial") return {cls:"warning", text:"เชื่อมต่อไม่ครบ"};
  if(ev.state === "offline") return {cls:"stale", text:"ออฟไลน์"};
  return {cls:"stale", text:"ไม่ทราบสถานะ"};
}

/* ============================================================
   สร้างสถิติสำหรับการ์ดหลัก (เฉพาะที่มีข้อมูลจริง)
   ============================================================ */
function fmtNum(n, digits=2){
  if(n===null || n===undefined) return null;
  return n.toFixed(digits);
}

function fmtSmart(n){
  if(n===null || n===undefined) return null;
  const a = Math.abs(n);
  if(a < 1) return n.toFixed(3);
  if(a < 10) return n.toFixed(2);
  if(a < 100) return n.toFixed(1);
  return n.toFixed(0);
}

function cardStats(site){
  const list = [];
  if(site.vendor === "Huawei"){
    if(site.metrics.dayPower !== null) list.push({label:"ผลผลิตวันนี้", val:fmtSmart(site.metrics.dayPower), unit:"kWh"});
    if(site.capacityKw !== null) list.push({label:"กำลังติดตั้ง", val:fmtSmart(site.capacityKw), unit:"kW"});
    if(site.metrics.savedCost !== null) list.push({label:"ประหยัดวันนี้", val:fmtSmart(site.metrics.savedCost), unit:"บาท"});
    return list.slice(0,3);
  } else if(site.vendor === "Deye"){
    if(site.livePowerKw !== null) list.push({label:"กำลังไฟ", val:fmtSmart(site.livePowerKw), unit:"kW"});
    if(site.capacityKw !== null) list.push({label:"กำลังติดตั้ง", val:fmtSmart(site.capacityKw), unit:"kW"});
    if(site.metrics.savedCost !== null && site.metrics.savedCost !== undefined) list.push({label:"ประหยัดวันนี้", val:fmtSmart(site.metrics.savedCost), unit:"บาท"});
    return list.slice(0,3);
  } else if(site.vendor === "Sigen"){
    if(site.livePowerKw !== null) list.push({label:"กำลังไฟ", val:fmtSmart(site.livePowerKw), unit:"kW"});
    if(site.capacityKw !== null) list.push({label:"กำลังติดตั้ง (PV)", val:fmtSmart(site.capacityKw), unit:"kW"});
    if(site.metrics.savedCost !== null && site.metrics.savedCost !== undefined) list.push({label:"ประหยัดวันนี้", val:fmtSmart(site.metrics.savedCost), unit:"บาท"});
    return list.slice(0,3);
  }
  return list.slice(0,2);
}

function relTime(d){
  if(!d) return "-";
  const min = Math.round((new Date() - d)/60000);
  if(min < 1) return "เมื่อสักครู่";
  if(min < 60) return `${min} นาทีที่แล้ว`;
  return `${Math.round(min/60)} ชม.ที่แล้ว`;
}

/* ============================================================
   RENDER — GRID
   ============================================================ */
let PAGES = [];
let currentPage = 0;
let rotateTimer = null;
let paused = false;
let allSites = [];

function buildCard(site){
  const ev = evaluate(site);
  const stats = cardStats(site);
  const pill = pillInfo(ev);

  const statsHtml = stats.length
    ? `<div class="stats${stats.length>=3?' stats-3':''}">${stats.map(s=>`<div class="stat"><div class="val">${s.val}</div><div class="lbl">${s.label}<span class="unit"> (${s.unit})</span></div></div>`).join("")}</div>`
    : `<div class="stats"><div class="stat"><div class="val" style="font-size:13px;color:var(--sub);">ยังไม่มีข้อมูล</div></div></div>`;

  const card = document.createElement("div");
  card.className = "card" + (ev.state === "fault" || ev.state === "issue" ? " issue" : "") + (ev.state === "partial" || ev.state === "warning" ? " warning" : "");
  card.innerHTML = `
    <div class="vendor-dot ${site.vendor}"></div>
    <div class="card-top">
      <div class="site-name">${site.name}</div>
      <div class="vendor-label">${site.vendor}</div>
    </div>
    ${statsHtml}
    <div class="card-bottom">
      <div class="status-pill ${pill.cls}"><span class="dot"></span>${pill.text}</div>
      <div class="updated">${relTime(site.lastUpdated)}</div>
    </div>
  `;
  card.addEventListener("click", () => openDetail(site));
  return card;
}

function renderPage(idx){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const page = PAGES[idx] || [];
  page.forEach(site => grid.appendChild(buildCard(site)));
  document.querySelectorAll("#dots span").forEach((d,i)=>d.classList.toggle("active", i===idx));
}

function buildDots(){
  const dots = document.getElementById("dots");
  dots.innerHTML = "";
  PAGES.forEach((_,i)=>{
    const d = document.createElement("span");
    d.onclick = ()=>{ currentPage = i; renderPage(currentPage); resetRotateTimer(); };
    dots.appendChild(d);
  });
}

function renderRibbon(){
  const ribbon = document.getElementById("ribbon");
  const track = document.getElementById("ribbonTrack");
  const issues = allSites.map(s=>({site:s, ev:evaluate(s)})).filter(x=>x.ev.state==="fault" || x.ev.state==="issue" || x.ev.state==="partial" || x.ev.state==="warning");
  if(!issues.length){ ribbon.classList.remove("show"); return; }
  ribbon.classList.add("show");
  track.innerHTML = "";
  const doubled = [...issues, ...issues];
  doubled.forEach(x=>{
    const span = document.createElement("span");
    const tag = x.ev.state === "fault" ? "ผิดพลาด" : x.ev.state === "partial" ? "เชื่อมต่อไม่ครบ" : x.ev.state === "warning" ? "แจ้งเตือน" : "ต้องตรวจสอบ";
    span.textContent = `${x.site.name} [${tag}] — ${x.ev.reason}`;
    span.addEventListener("click", ()=> openDetail(x.site));
    track.appendChild(span);
  });
}

function renderFooter(){
  const totalPower = allSites.reduce((a,s)=> a + (s.livePowerKw || 0), 0);
  const issueCount = allSites.filter(s=>{const st=evaluate(s).state; return st==="fault"||st==="issue"||st==="partial"||st==="warning";}).length;
  const offlineCount = allSites.filter(s=>evaluate(s).state==="offline").length;
  document.getElementById("totSites").textContent = allSites.length;
  document.getElementById("totPower").textContent = totalPower.toFixed(1);
  document.getElementById("totIssue").textContent = issueCount;
  document.getElementById("totStale").textContent = offlineCount;
  document.getElementById("totRefresh").textContent = new Date().toLocaleTimeString("th-TH");
}

function isMobileView(){
  return window.matchMedia("(max-width:700px)").matches;
}

let searchQuery = "";

function paginate(){
  const filtered = searchQuery
    ? allSites.filter(s => s.name.toLowerCase().includes(searchQuery) || s.id.toLowerCase().includes(searchQuery))
    : allSites;

  document.getElementById("searchNoResults").style.display = (searchQuery && !filtered.length) ? "flex" : "none";
  document.getElementById("grid").style.display = (searchQuery && !filtered.length) ? "none" : "grid";

  if(searchQuery || isMobileView()){
    PAGES = [filtered];
  } else {
    PAGES = [];
    for(let i=0;i<filtered.length;i+=PAGE_SIZE){
      PAGES.push(filtered.slice(i, i+PAGE_SIZE));
    }
  }
  if(!PAGES.length) PAGES = [[]];
  currentPage = Math.min(currentPage, PAGES.length-1);
}

function resetRotateTimer(){
  clearInterval(rotateTimer);
  if(paused || isMobileView() || searchQuery || PAGES.length <= 1) return;
  rotateTimer = setInterval(()=>{
    currentPage = (currentPage+1) % PAGES.length;
    renderPage(currentPage);
  }, ROTATE_MS);
}

document.getElementById("pauseBtn").addEventListener("click", ()=>{
  paused = !paused;
  document.getElementById("pauseBtn").textContent = paused ? "▶ เล่นต่อ" : "⏸ หยุดเลื่อน";
  resetRotateTimer();
});

const searchToggleBtn = document.getElementById("searchToggleBtn");
const searchBar = document.getElementById("searchBar");
searchToggleBtn.addEventListener("click", (e)=>{
  e.stopPropagation();
  searchBar.classList.toggle("show");
  if(searchBar.classList.contains("show")) searchInput.focus();
});
document.addEventListener("click", (e)=>{
  if(!searchBar.contains(e.target) && e.target !== searchToggleBtn && searchBar.classList.contains("show")){
    searchBar.classList.remove("show");
  }
});
searchBar.addEventListener("click", (e)=> e.stopPropagation());

const searchInput = document.getElementById("searchInput");
const searchClear = document.getElementById("searchClear");
searchInput.addEventListener("input", ()=>{
  searchQuery = searchInput.value.trim().toLowerCase();
  searchClear.style.display = searchQuery ? "block" : "none";
  if(!allSites.length) return;
  paginate();
  buildDots();
  currentPage = 0;
  renderPage(currentPage);
  resetRotateTimer();
});
searchClear.addEventListener("click", ()=>{
  searchInput.value = "";
  searchQuery = "";
  searchClear.style.display = "none";
  if(!allSites.length) return;
  paginate();
  buildDots();
  currentPage = 0;
  renderPage(currentPage);
  resetRotateTimer();
});

}

          <div class="alarm-card" style="${a.impact ? '' : 'background:var(--yellow-soft);'}">
            <div class="aname" style="${a.impact ? '' : 'color:#7a5a00;'}">${a.name}${a.impact ? ' · กระทบการผลิต' : ' · ไม่กระทบการผลิต'}</div>
            ${a.deviceType ? `<div class="arow" style="${a.impact ? '' : 'color:#8a6224;'}"><b>อุปกรณ์:</b> ${a.deviceType}</div>` : ""}
            ${a.startTime ? `<div class="arow" style="${a.impact ? '' : 'color:#8a6224;'}"><b>เริ่มเกิด:</b> ${a.startTime}</div>` : ""}
          </div>`;
      });
    } else {
      html += `<div class="modal-section-title">Alert</div><div class="no-alarm-note">ไม่มี alert active อยู่ตอนนี้ (ข้อมูลจาก Deye Alert API จริง)</div>`;
    }

    if(site.deviceStatusList && site.deviceStatusList.length){
      html += `<div class="modal-section-title">สถานะการเชื่อมต่ออุปกรณ์ (${site.deviceStatusList.length})</div>`;
      site.deviceStatusList.forEach(d=>{
        html += `<div class="device-card">
          <div class="dname">${d.type}</div>
          <div class="drow"><span>สถานะ</span><b style="color:${d.connected ? '#186b38' : '#a8281c'}">${d.connected ? 'เชื่อมต่ออยู่' : 'ขาดการเชื่อมต่อ'}</b></div>
          ${d.lastSeen ? `<div class="drow"><span>เห็นข้อมูลล่าสุด</span><b>${d.lastSeen}</b></div>` : ""}
        </div>`;
      });
    }

    const ev = evaluate(site);
    if(ev.state === "issue" || ev.state === "fault" || ev.state === "partial" || ev.state === "warning"){
      html += `<div class="modal-section-title">สถานะที่ตรวจพบ</div><div class="alarm-card"><div class="aname">${ev.reason}</div></div>`;
    }
    html += `<div class="heuristic-note">ℹ️ "Alert" และ "เชื่อมต่อไม่ครบ/ออฟไลน์" มาจากข้อมูลจริงของ Deye (Alert API + connectStatus รายอุปกรณ์) ส่วนสถานะ "ต้องตรวจสอบ" (กำลังไฟเป็น 0 ต่อเนื่อง 15 นาที) ยังเป็นการประเมิน heuristic สำรอง ใช้เฉพาะตอนไม่มี alert/connectivity ผิดปกติให้เห็น<br>ℹ️ "ใช้เองวันนี้"/"ประหยัดวันนี้" คำนวณจาก (ใช้ไฟรวมวันนี้ − ซื้อไฟจากการไฟฟ้าวันนี้) x 4.5 บาท/kWh จากข้อมูล /station/history ของ Deye</div>`;

  } else if(site.vendor === "Sigen"){
    const m = site.metrics;
    html += `<div class="modal-section-title">ผลผลิตพลังงาน</div><div class="detail-rows">`;
    html += row("กำลังไฟตอนนี้", fmtNum(site.livePowerKw,2), "kW");
    html += row("ผลผลิตวันนี้", fmtNum(m.dayEnergy,2), "kWh");
    html += row("ผลผลิตเดือนนี้", fmtNum(m.monthEnergy,1), "kWh");
    html += row("ผลผลิตปีนี้", fmtNum(m.annualEnergy,1), "kWh");
    html += row("ผลผลิตสะสมทั้งหมด", fmtNum(m.lifetimeEnergy,1), "kWh");
    html += row("กำลังการผลิตติดตั้ง (PV)", fmtNum(site.capacityKw,2), "kW");
    html += row("ความจุแบตเตอรี่", fmtNum(site.batteryCapacityKw,2), "kWh");
    html += row("ประหยัดวันนี้ (โดยประมาณ)", fmtNum(m.savedCost,2), "บาท");
    html += `</div>`;

    if(m.lifetimeCo2 !== null || m.lifetimeTree !== null){
      html += `<div class="modal-section-title">ผลกระทบต่อสิ่งแวดล้อม (สะสม)</div><div class="detail-rows">`;
      html += row("ลด CO₂", fmtNum(m.lifetimeCo2,2), "ตัน");
      html += row("เทียบเท่าปลูกต้นไม้", fmtNum(m.lifetimeTree,1), "ต้น");
      html += `</div>`;
    }

    if(site.devices && site.devices.length){
      html += `<div class="modal-section-title">อุปกรณ์ในระบบ (${site.devices.length})</div>`;
      site.devices.forEach(d=>{
        html += `<div class="device-card">
          <div class="dname">${d.type}${d.status ? " · " + d.status : ""}</div>
          ${d.activePower!==null?`<div class="drow"><span>กำลังไฟ</span><b>${fmtNum(d.activePower,2)} kW</b></div>`:""}
          ${d.pvPower!==null?`<div class="drow"><span>กำลังไฟจากแผง</span><b>${fmtNum(d.pvPower,2)} kW</b></div>`:""}
          ${d.temp!==null?`<div class="drow"><span>อุณหภูมิ</span><b>${fmtNum(d.temp,1)} °C</b></div>`:""}
          ${d.gridFreq!==null?`<div class="drow"><span>ความถี่ไฟฟ้า</span><b>${fmtNum(d.gridFreq,2)} Hz</b></div>`:""}
        </div>`;
      });
    }

    const ev = evaluate(site);
    if(ev.state === "issue" || ev.state === "fault"){
      html += `<div class="modal-section-title">สถานะที่ตรวจพบ</div><div class="alarm-card"><div class="aname">${ev.reason}</div></div>`;
    }
    html += `<div class="heuristic-note">⚠️ Sigenergy alarm ต้องใช้ MQTT subscription แบบ real-time ซึ่งยังไม่ได้เชื่อมต่อ — สถานะข้างต้นประเมินจากข้อมูลกำลังไฟเท่านั้น<br>ℹ️ "ประหยัดวันนี้" คำนวณจากผลผลิตรวมทั้งหมด x 4.5 บาท/kWh (ไม่ได้แยกว่าใช้เองเท่าไหร่ ขายเข้าระบบเท่าไหร่ เพราะ Sigen API ไม่ได้แยกให้)</div>`;
  }
  return html;
}

function openDetail(site){
  paused = true;
  document.getElementById("pauseBtn").textContent = "▶ เล่นต่อ";
  resetRotateTimer();

  const stats = cardStats(site);
  const ev = evaluate(site);
  const pill = pillInfo(ev);

  const topStatsHtml = stats.map(s=>`<div class="stat"><div class="val">${s.val}</div><div class="lbl">${s.label}<span class="unit"> (${s.unit})</span></div></div>`).join("")
    + `<div class="stat" style="display:flex;flex-direction:column;justify-content:center;"><div class="status-pill ${pill.cls}" style="justify-content:center;"><span class="dot"></span>${pill.text}</div></div>`;

  document.getElementById("modalContent").innerHTML = `
    <div class="modal-header">
      <h2>${site.name}</h2>
      <div class="vendor-chip ${site.vendor}">${site.vendor}</div>
    </div>
    <div class="modal-sub">รหัสไซต์: ${site.id} · อัปเดตล่าสุด ${relTime(site.lastUpdated)}</div>
    <div class="modal-stats">${topStatsHtml}</div>
    ${buildDetailBody(site)}
  `;
  document.getElementById("modalOverlay").classList.add("show");
}

function closeDetail(){
  document.getElementById("modalOverlay").classList.remove("show");
}
document.getElementById("modalClose").addEventListener("click", closeDetail);
document.getElementById("modalOverlay").addEventListener("click", (e)=>{
  if(e.target.id === "modalOverlay") closeDetail();
});
document.addEventListener("keydown", (e)=>{
  if(e.key === "Escape") closeDetail();
});

/* ============================================================
   CLOCK
   ============================================================ */
function tickClock(){
  const now = new Date();
  document.getElementById("clock").innerHTML =
    now.toLocaleTimeString("th-TH") +
    `<small>${now.toLocaleDateString("th-TH", {weekday:"long", day:"numeric", month:"long", year:"numeric"})}</small>`;
}
setInterval(tickClock, 1000);
tickClock();

/* ============================================================
   MAIN LOAD LOOP
   ============================================================ */
async function refreshData(){
  try{
    allSites = await loadAllSites();
    allSites.sort((a,b)=>{
      const ea = evaluate(a).state, eb = evaluate(b).state;
      const rank = s => s==="fault" ? 0 : s==="warning" ? 1 : s==="partial" ? 2 : s==="issue" ? 3 : s==="offline" ? 4 : 5;
      if(rank(ea) !== rank(eb)) return rank(ea)-rank(eb);
      return a.name.localeCompare(b.name, "th");
    });
    paginate();
    buildDots();
    renderPage(currentPage);
    renderRibbon();
    renderFooter();
    document.getElementById("loading").style.display = "none";
    document.getElementById("errorBox").style.display = "none";
    document.getElementById("grid").style.display = "grid";
    document.getElementById("footerBox").style.display = "flex";
    resetRotateTimer();
  }catch(err){
    console.error(err);
    document.getElementById("loading").style.display = "none";
    document.getElementById("grid").style.display = "none";
    document.getElementById("footerBox").style.display = "none";
    document.getElementById("errorBox").style.display = "flex";
  }
}

refreshData();
setInterval(refreshData, DATA_REFRESH_MS);

let resizeTimer;
window.addEventListener("resize", ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{
    if(!allSites.length) return;
    paginate();
    buildDots();
    renderPage(currentPage);
    resetRotateTimer();
  }, 250);
});
</script>
