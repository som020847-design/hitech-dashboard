<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>HI-TECH ECO ENERGY — Solar Monitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root{
    --bg:#fdfaf4;
    --panel:#ffffff;
    --ink:#20241f;
    --sub:#6b6a63;
    --line:#e9e3d4;
    --sun:#f5a623;
    --sun-deep:#e0791a;
    --leaf:#3f8f5c;
    --leaf-soft:#e6f4ea;
    --bad:#d1483f;
    --bad-soft:#fbe6e3;
    --stale:#8a8a82;
    --stale-soft:#eeece3;
    --huawei:#3f6fb0;
    --deye:#0f9b8e;
    --sigen:#8451c9;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:"Segoe UI","Noto Sans Thai",system-ui,-apple-system,sans-serif;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    height:100vh;
  }

  /* ---------- Header ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 32px;
    background:linear-gradient(90deg,#1c2b21,#26382b);
    color:#fdfaf4;
    flex-shrink:0;
  }
  .brand h1{font-size:20px;margin:0;font-weight:700;letter-spacing:.3px;}
  .brand span{font-size:12px;color:#c9d3c8;display:block;margin-top:2px;}
  .header-right{display:flex;align-items:center;gap:22px;}
  #clock{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}
  #clock small{display:block;font-size:11px;font-weight:400;color:#c9d3c8;text-align:right;}
  #pauseBtn{
    border:1px solid #4d5f4c;background:#2f402f;color:#fdfaf4;
    padding:8px 16px;border-radius:999px;font-size:13px;cursor:pointer;
    display:flex;align-items:center;gap:6px;
  }
  #pauseBtn:hover{background:#3a4d39;}

  /* ---------- Problem ribbon ---------- */
  #ribbon{
    flex-shrink:0;
    background:var(--bad);
    color:#fff;
    display:none;
    align-items:center;
    gap:14px;
    padding:9px 28px;
    font-size:14px;
    font-weight:600;
    overflow:hidden;
    white-space:nowrap;
  }
  #ribbon.show{display:flex;}
  #ribbon .tag{
    background:#fff2;padding:3px 10px;border-radius:999px;font-size:12px;flex-shrink:0;
  }
  #ribbonTrack{display:inline-flex;gap:28px;animation:scroll 22s linear infinite;}
  #ribbonTrack span{cursor:pointer;text-decoration:underline;text-decoration-color:#fff6;text-underline-offset:3px;}
  #ribbonTrack span:hover{text-decoration-color:#fff;}
  @keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}

  /* ---------- Main grid ---------- */
  main{
    flex:1;
    padding:26px 32px 10px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    grid-auto-rows:1fr;
    gap:18px;
    overflow:hidden;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:16px 16px 14px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    box-shadow:0 1px 3px rgba(0,0,0,.03);
    position:relative;
    overflow:hidden;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 16px rgba(0,0,0,.08);
  }
  .card.issue{
    border-color:var(--bad);
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(209,72,63,.35);}
    50%{box-shadow:0 0 0 7px rgba(209,72,63,0);}
  }
  .card.stale{opacity:.55;}
  .vendor-tag{
    position:absolute;top:0;left:0;width:5px;height:100%;
  }
  .vendor-tag.Huawei{background:var(--huawei);}
  .vendor-tag.Deye{background:var(--deye);}
  .vendor-tag.Sigen{background:var(--sigen);}

  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
  .site-name{
    font-size:15px;font-weight:700;line-height:1.25;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .vendor-pill{
    font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;
    color:#fff;flex-shrink:0;white-space:nowrap;
  }
  .vendor-pill.Huawei{background:var(--huawei);}
  .vendor-pill.Deye{background:var(--deye);}
  .vendor-pill.Sigen{background:var(--sigen);}

  .stats{display:flex;gap:10px;margin-top:10px;}
  .stat{
    flex:1;background:var(--leaf-soft);border-radius:12px;
    padding:10px 10px;text-align:center;
  }
  .stat .val{font-size:20px;font-weight:800;color:#20402c;font-variant-numeric:tabular-nums;}
  .stat .lbl{font-size:10px;color:#4c6952;margin-top:2px;}
  .card.issue .stat{background:var(--bad-soft);}
  .card.issue .stat .val{color:#7c2a24;}
  .card.issue .stat .lbl{color:#93413a;}

  .card-bottom{
    display:flex;justify-content:space-between;align-items:center;margin-top:10px;
  }
  .status-pill{
    font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;
    display:flex;align-items:center;gap:5px;
  }
  .status-pill .dot{width:7px;height:7px;border-radius:50%;}
  .status-pill.ok{background:var(--leaf-soft);color:#1f5c33;}
  .status-pill.ok .dot{background:var(--leaf);}
  .status-pill.issue{background:var(--bad-soft);color:#93231a;}
  .status-pill.issue .dot{background:var(--bad);}
  .status-pill.stale{background:var(--stale-soft);color:#55554e;}
  .status-pill.stale .dot{background:var(--stale);}
  .updated{font-size:10px;color:var(--sub);}

  /* ---------- Footer ---------- */
  footer{
    flex-shrink:0;
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 32px 18px;
  }
  .totals{display:flex;gap:26px;font-size:12px;color:var(--sub);}
  .totals b{color:var(--ink);font-size:14px;}
  .dots{display:flex;gap:7px;}
  .dots span{width:8px;height:8px;border-radius:50%;background:var(--line);transition:.25s;cursor:pointer;}
  .dots span.active{background:var(--sun-deep);width:22px;border-radius:5px;}

  #loading, #errorBox{
    flex:1;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:10px;color:var(--sub);font-size:15px;text-align:center;padding:0 40px;
  }
  #errorBox{display:none;color:#93231a;}
  #errorBox code{background:#f3ede0;padding:2px 6px;border-radius:6px;font-size:13px;}

  /* ---------- Detail modal ---------- */
  #modalOverlay{
    display:none;position:fixed;inset:0;background:rgba(20,24,20,.55);
    z-index:50;align-items:center;justify-content:center;padding:30px;
  }
  #modalOverlay.show{display:flex;}
  #modalBox{
    background:var(--panel);border-radius:18px;max-width:640px;width:100%;
    max-height:85vh;overflow-y:auto;padding:26px 28px;position:relative;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
  }
  #modalClose{
    position:absolute;top:16px;right:16px;background:var(--stale-soft);border:none;
    width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;color:var(--sub);
  }
  #modalClose:hover{background:var(--line);}
  .modal-header{display:flex;align-items:center;gap:10px;margin-bottom:4px;padding-right:36px;}
  .modal-header h2{font-size:19px;margin:0;}
  .modal-sub{font-size:12px;color:var(--sub);margin-bottom:18px;}
  .modal-stats{display:flex;gap:12px;margin-bottom:18px;}
  .modal-stats .stat{flex:1;}
  .modal-section-title{font-size:13px;font-weight:700;color:var(--sub);margin:18px 0 8px;text-transform:uppercase;letter-spacing:.4px;}
  .alarm-card{
    background:var(--bad-soft);border-radius:12px;padding:14px 16px;margin-bottom:10px;
  }
  .alarm-card .aname{font-weight:700;color:#7c2a24;font-size:14px;margin-bottom:4px;}
  .alarm-card .arow{font-size:12px;color:#5c2a24;margin-top:6px;line-height:1.5;}
  .alarm-card .arow b{color:#3f1a16;}
  .no-alarm-note{
    background:var(--leaf-soft);color:#1f5c33;border-radius:12px;padding:14px 16px;font-size:13px;
  }
  .heuristic-note{
    background:var(--stale-soft);color:#55554e;border-radius:12px;padding:12px 14px;font-size:12px;margin-top:10px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>HI-TECH ECO ENERGY</h1>
    <span>Solar Monitoring — Live Overview</span>
  </div>
  <div class="header-right">
    <div id="clock">--:--:-- <small id="dateLine">-</small></div>
    <button id="pauseBtn">⏸ หยุดเลื่อน</button>
  </div>
</header>

<div id="ribbon">
  <span class="tag">ต้องตรวจสอบ</span>
  <div id="ribbonTrack"></div>
</div>

<div id="loading">กำลังโหลดข้อมูลจาก Google Sheet…</div>
<div id="errorBox">
  <div>โหลดข้อมูลไม่สำเร็จ</div>
  <div>เช็คว่าเปิด Share → General access → <code>Anyone with the link (Viewer)</code> ของ Google Sheet แล้วหรือยัง</div>
</div>

<main id="grid" style="display:none;"></main>

<footer id="footerBox" style="display:none;">
  <div class="totals">
    <div>ไซต์ทั้งหมด <b id="totSites">0</b></div>
    <div>กำลังผลิตรวม <b id="totPower">0</b> kW</div>
    <div>ต้องตรวจสอบ <b id="totIssue">0</b></div>
    <div>อัปเดตข้อมูลล่าสุด <b id="totRefresh">-</b></div>
  </div>
  <div class="dots" id="dots"></div>
</footer>

<div id="modalOverlay">
  <div id="modalBox">
    <button id="modalClose">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const SHEET_ID = "1zz5nbLT4SjKFHYWsrsR8TvVpGjgNuOLQHRDe_3ltNNU";
const PAGE_SIZE = 10;
const ROTATE_MS = 30000;
const DATA_REFRESH_MS = 5 * 60000;
const STALE_MIN = 40;
const DAY_START_HOUR = 6;
const DAY_END_HOUR = 18;

function gvizUrl(sheetName){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
}

/* ============================================================
   CSV PARSER
   ============================================================ */
function parseCSV(text){
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], n = text[i+1];
    if(inQuotes){
      if(c === '"' && n === '"'){ field += '"'; i++; }
      else if(c === '"'){ inQuotes = false; }
      else{ field += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field=""; }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=""; }
      else if(c === '\r'){ /* skip */ }
      else{ field += c; }
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  if(!rows.length) return [];
  const headers = rows[0].map(h=>h.trim());
  return rows.slice(1).filter(r=>r.length>1 || r[0]!=="").map(r=>{
    const o = {};
    headers.forEach((h,idx)=> o[h] = (r[idx]!==undefined ? r[idx].trim() : ""));
    return o;
  });
}

async function fetchSheet(sheetName){
  const res = await fetch(gvizUrl(sheetName));
  if(!res.ok) throw new Error(`โหลด ${sheetName} ไม่สำเร็จ (${res.status})`);
  const text = await res.text();
  return parseCSV(text);
}

function num(v){
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}

function latestByKey(rows, keyField){
  const map = new Map();
  for(const r of rows){
    if(!r[keyField]) continue;
    map.set(r[keyField], r);
  }
  return [...map.values()];
}

function parseTimestamp(s){
  if(!s) return null;
  const d = new Date(s.replace(" ", "T"));
  return isNaN(d.getTime()) ? null : d;
}

/* ============================================================
   โหลดและรวมข้อมูล
   ============================================================ */
async function loadAllSites(){
  const [huawei, deye, sigenInv, huaweiAlarmsRaw] = await Promise.all([
    fetchSheet("Latest_Data"),
    fetchSheet("Deye_Realtime_Data"),
    fetchSheet("Sigen_Inverter_Data"),
    fetchSheet("Huawei_Alarms").catch(() => [])
  ]);

  // ---- หา batch ล่าสุดของ Huawei_Alarms พร้อมรายละเอียดเต็ม (ไม่ใช่แค่ชื่อ) ----
  let latestHuaweiAlarmMap = new Map();   // stationCode -> [{name, device, severity, occurTime, cause, suggestion}, ...]
  if (huaweiAlarmsRaw.length){
    const times = huaweiAlarmsRaw.map(r => parseTimestamp(r.timestamp_polled)).filter(Boolean);
    if (times.length){
      const latestTime = Math.max(...times.map(d => d.getTime()));
      const latestStr = huaweiAlarmsRaw.find(r => {
        const t = parseTimestamp(r.timestamp_polled);
        return t && t.getTime() === latestTime;
      })?.timestamp_polled;

      huaweiAlarmsRaw
        .filter(r => r.timestamp_polled === latestStr)
        .forEach(r => {
          const key = r.stationCode;
          if (!key) return;
          if (!latestHuaweiAlarmMap.has(key)) latestHuaweiAlarmMap.set(key, []);
          latestHuaweiAlarmMap.get(key).push({
            name: r.alarmName || "Alarm",
            device: r.deviceName || "",
            severity: r.alarmSeverity || "",
            occurTime: r.occurTime || "",
            cause: r.alarmCause || "",
            suggestion: r.repairSuggestion || ""
          });
        });
    }
  }

  const sites = [];

  // ---- Huawei ----
  for(const r of huawei){
    if(!r.stationCode) continue;
    sites.push({
      vendor:"Huawei",
      id:r.stationCode,
      name:r.stationName || r.stationCode,
      livePowerKw:null,
      dayEnergyKwh:num(r.day_power),
      rawStatus:r.status || "",
      lastUpdated:parseTimestamp(r.timestamp),
      activeAlarms: latestHuaweiAlarmMap.get(r.stationCode) || []
    });
  }

  // ---- Deye ----
  const deyeLatest = latestByKey(deye, "stationId");
  for(const r of deyeLatest){
    sites.push({
      vendor:"Deye",
      id:r.stationId,
      name:r.stationName || r.stationId,
      livePowerKw:num(r.active_power_kW),
      dayEnergyKwh:null,
      rawStatus:"",
      lastUpdated:parseTimestamp(r.timestamp),
      activeAlarms: []
    });
  }

  // ---- Sigen ----
  const bySystem = new Map();
  for(const r of sigenInv){
    if(!r.systemId) continue;
    const key = r.systemId;
    if(!bySystem.has(key)){
      bySystem.set(key, {
        vendor:"Sigen", id:key, name:r.systemName || key,
        livePowerKw:0, dayEnergyKwh:null, rawStatus:"", lastUpdated:null, activeAlarms: []
      });
    }
    const s = bySystem.get(key);
    const p = num(r.pv_power_kW);
    if(p !== null) s.livePowerKw += p;
    const t = parseTimestamp(r.timestamp);
    if(t && (!s.lastUpdated || t > s.lastUpdated)){
      s.lastUpdated = t;
      s.rawStatus = r.status || s.rawStatus;
    }
  }
  sites.push(...bySystem.values());

  return sites;
}

/* ============================================================
   ตัดสิน "ปัญหา"
   ============================================================ */
function evaluate(site){
  const now = new Date();
  const hour = now.getHours();
  const isDaytime = hour >= DAY_START_HOUR && hour < DAY_END_HOUR;

  if(!site.lastUpdated){
    return {state:"stale", reason:"ไม่มีข้อมูล", isReal:true};
  }
  const ageMin = (now - site.lastUpdated) / 60000;
  if(ageMin > STALE_MIN){
    return {state:"stale", reason:`ไม่อัปเดต ${Math.round(ageMin)} นาที`, isReal:true};
  }

  if(site.vendor === "Huawei"){
    if(site.activeAlarms && site.activeAlarms.length){
      const names = site.activeAlarms.map(a=>a.name).join(", ");
      return {state:"issue", reason:names, isReal:true};
    }
    return {state:"ok", reason:"", isReal:true};
  }

  const statusLower = (site.rawStatus || "").toLowerCase();
  if(statusLower.includes("fault") || statusLower.includes("alarm")){
    return {state:"issue", reason:`สถานะ: ${site.rawStatus}`, isReal:false};
  }
  if(site.livePowerKw !== null){
    if(isDaytime && site.livePowerKw < 0.05){
      return {state:"issue", reason:"กำลังไฟฟ้าเป็น 0 ตอนกลางวัน", isReal:false};
    }
  } else if(site.dayEnergyKwh !== null){
    if(hour >= 10 && site.dayEnergyKwh < 0.05){
      return {state:"issue", reason:"ยังไม่มีผลผลิตวันนี้", isReal:false};
    }
  }
  return {state:"ok", reason:"", isReal:false};
}

/* ============================================================
   RENDER
   ============================================================ */
let PAGES = [];
let currentPage = 0;
let rotateTimer = null;
let paused = false;
let allSites = [];

function fmtNum(n, digits=2){
  return n===null || n===undefined ? "–" : n.toFixed(digits);
}
function relTime(d){
  if(!d) return "-";
  const min = Math.round((new Date() - d)/60000);
  if(min < 1) return "เมื่อสักครู่";
  if(min < 60) return `${min} นาทีที่แล้ว`;
  return `${Math.round(min/60)} ชม.ที่แล้ว`;
}

function buildCard(site){
  const ev = evaluate(site);
  const primaryVal = site.livePowerKw !== null ? fmtNum(site.livePowerKw) : fmtNum(site.dayEnergyKwh);
  const primaryLbl = site.livePowerKw !== null ? "กำลังไฟ (kW)" : "ผลผลิตวันนี้ (kWh)";
  const secondaryVal = site.livePowerKw !== null ? fmtNum(site.dayEnergyKwh) : "–";
  const secondaryLbl = site.livePowerKw !== null ? "ผลผลิตวันนี้ (kWh)" : "—";

  const pillClass = ev.state === "ok" ? "ok" : ev.state === "issue" ? "issue" : "stale";
  const pillText = ev.state === "ok" ? "ปกติ" : ev.state === "issue" ? "ต้องตรวจสอบ" : "ไม่มีข้อมูล";

  const card = document.createElement("div");
  card.className = "card" + (ev.state === "issue" ? " issue" : "") + (ev.state === "stale" ? " stale" : "");
  card.innerHTML = `
    <div class="vendor-tag ${site.vendor}"></div>
    <div class="card-top">
      <div class="site-name">${site.name}</div>
      <div class="vendor-pill ${site.vendor}">${site.vendor}</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="val">${primaryVal}</div><div class="lbl">${primaryLbl}</div></div>
      <div class="stat"><div class="val">${secondaryVal}</div><div class="lbl">${secondaryLbl}</div></div>
    </div>
    <div class="card-bottom">
      <div class="status-pill ${pillClass}"><span class="dot"></span>${pillText}</div>
      <div class="updated">${relTime(site.lastUpdated)}</div>
    </div>
  `;
  card.addEventListener("click", () => openDetail(site));
  return card;
}

function renderPage(idx){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const page = PAGES[idx] || [];
  page.forEach(site => grid.appendChild(buildCard(site)));
  document.querySelectorAll("#dots span").forEach((d,i)=>d.classList.toggle("active", i===idx));
}

function buildDots(){
  const dots = document.getElementById("dots");
  dots.innerHTML = "";
  PAGES.forEach((_,i)=>{
    const d = document.createElement("span");
    d.onclick = ()=>{ currentPage = i; renderPage(currentPage); resetRotateTimer(); };
    dots.appendChild(d);
  });
}

function renderRibbon(){
  const ribbon = document.getElementById("ribbon");
  const track = document.getElementById("ribbonTrack");
  const issues = allSites.map(s=>({site:s, ev:evaluate(s)})).filter(x=>x.ev.state==="issue");
  if(!issues.length){ ribbon.classList.remove("show"); return; }
  ribbon.classList.add("show");
  track.innerHTML = "";
  const doubled = [...issues, ...issues];
  doubled.forEach(x=>{
    const span = document.createElement("span");
    span.textContent = `${x.site.name} — ${x.ev.reason}`;
    span.addEventListener("click", ()=> openDetail(x.site));
    track.appendChild(span);
  });
}

function renderFooter(){
  const totalPower = allSites.reduce((a,s)=> a + (s.livePowerKw || 0), 0);
  const issueCount = allSites.filter(s=>evaluate(s).state==="issue").length;
  document.getElementById("totSites").textContent = allSites.length;
  document.getElementById("totPower").textContent = totalPower.toFixed(1);
  document.getElementById("totIssue").textContent = issueCount;
  document.getElementById("totRefresh").textContent = new Date().toLocaleTimeString("th-TH");
}

function paginate(){
  PAGES = [];
  for(let i=0;i<allSites.length;i+=PAGE_SIZE){
    PAGES.push(allSites.slice(i, i+PAGE_SIZE));
  }
  if(!PAGES.length) PAGES = [[]];
  currentPage = Math.min(currentPage, PAGES.length-1);
}

function resetRotateTimer(){
  clearInterval(rotateTimer);
  if(paused) return;
  rotateTimer = setInterval(()=>{
    currentPage = (currentPage+1) % PAGES.length;
    renderPage(currentPage);
  }, ROTATE_MS);
}

document.getElementById("pauseBtn").addEventListener("click", ()=>{
  paused = !paused;
  document.getElementById("pauseBtn").textContent = paused ? "▶ เล่นต่อ" : "⏸ หยุดเลื่อน";
  resetRotateTimer();
});

/* ============================================================
   DETAIL MODAL
   ============================================================ */
function openDetail(site){
  paused = true;
  document.getElementById("pauseBtn").textContent = "▶ เล่นต่อ";
  resetRotateTimer();

  const ev = evaluate(site);
  const primaryVal = site.livePowerKw !== null ? fmtNum(site.livePowerKw) : fmtNum(site.dayEnergyKwh);
  const primaryLbl = site.livePowerKw !== null ? "กำลังไฟ (kW)" : "ผลผลิตวันนี้ (kWh)";
  const secondaryVal = site.livePowerKw !== null ? fmtNum(site.dayEnergyKwh) : "–";
  const secondaryLbl = site.livePowerKw !== null ? "ผลผลิตวันนี้ (kWh)" : "—";
  const pillClass = ev.state === "ok" ? "ok" : ev.state === "issue" ? "issue" : "stale";
  const pillText = ev.state === "ok" ? "ปกติ" : ev.state === "issue" ? "ต้องตรวจสอบ" : "ไม่มีข้อมูล";

  let alarmHtml = "";
  if(site.vendor === "Huawei"){
    if(site.activeAlarms && site.activeAlarms.length){
      alarmHtml = `<div class="modal-section-title">Alarm ที่กำลัง Active (${site.activeAlarms.length})</div>`;
      site.activeAlarms.forEach(a=>{
        alarmHtml += `
          <div class="alarm-card">
            <div class="aname">${a.name}${a.severity ? " · " + a.severity : ""}</div>
            ${a.device ? `<div class="arow"><b>อุปกรณ์:</b> ${a.device}</div>` : ""}
            ${a.occurTime ? `<div class="arow"><b>เวลาที่เกิด:</b> ${a.occurTime}</div>` : ""}
            ${a.cause ? `<div class="arow"><b>สาเหตุ:</b> ${a.cause}</div>` : ""}
            ${a.suggestion ? `<div class="arow"><b>วิธีแก้:</b> ${a.suggestion}</div>` : ""}
          </div>
        `;
      });
    } else if(ev.state === "ok") {
      alarmHtml = `<div class="modal-section-title">Alarm</div><div class="no-alarm-note">ไม่มี alarm active อยู่ตอนนี้</div>`;
    }
  } else {
    // Deye / Sigen — ไม่มี alarm จริง ใช้ heuristic
    if(ev.state === "issue"){
      alarmHtml = `
        <div class="modal-section-title">สถานะที่ตรวจพบ</div>
        <div class="alarm-card">
          <div class="aname">${ev.reason}</div>
        </div>
        <div class="heuristic-note">
          ⚠️ ${site.vendor} ยังไม่มี Alarm API จริงให้ดึง — ข้อความนี้เป็นการ<b>ประเมินจากข้อมูลกำลังไฟ/ผลผลิต</b> เท่านั้น
          ไม่ใช่ alarm ที่ยืนยันจากผู้ผลิต ควรให้ช่างเข้าไปตรวจสอบหน้างานเพื่อยืนยันสาเหตุจริง
        </div>
      `;
    } else if(ev.state === "ok") {
      alarmHtml = `<div class="modal-section-title">สถานะ</div><div class="no-alarm-note">ไม่พบความผิดปกติจากข้อมูลที่มี (ประเมินแบบ heuristic ไม่ใช่ alarm จริง)</div>`;
    }
  }

  document.getElementById("modalContent").innerHTML = `
    <div class="modal-header">
      <h2>${site.name}</h2>
      <div class="vendor-pill ${site.vendor}">${site.vendor}</div>
    </div>
    <div class="modal-sub">รหัสไซต์: ${site.id} · อัปเดตล่าสุด ${relTime(site.lastUpdated)}</div>
    <div class="modal-stats">
      <div class="stat"><div class="val">${primaryVal}</div><div class="lbl">${primaryLbl}</div></div>
      <div class="stat"><div class="val">${secondaryVal}</div><div class="lbl">${secondaryLbl}</div></div>
      <div class="stat"><div class="status-pill ${pillClass}" style="justify-content:center;"><span class="dot"></span>${pillText}</div></div>
    </div>
    ${alarmHtml}
  `;
  document.getElementById("modalOverlay").classList.add("show");
}

function closeDetail(){
  document.getElementById("modalOverlay").classList.remove("show");
}
document.getElementById("modalClose").addEventListener("click", closeDetail);
document.getElementById("modalOverlay").addEventListener("click", (e)=>{
  if(e.target.id === "modalOverlay") closeDetail();
});
document.addEventListener("keydown", (e)=>{
  if(e.key === "Escape") closeDetail();
});

/* ============================================================
   CLOCK
   ============================================================ */
function tickClock(){
  const now = new Date();
  document.getElementById("clock").innerHTML =
    now.toLocaleTimeString("th-TH") +
    `<small>${now.toLocaleDateString("th-TH", {weekday:"long", day:"numeric", month:"long", year:"numeric"})}</small>`;
}
setInterval(tickClock, 1000);
tickClock();

/* ============================================================
   MAIN LOAD LOOP
   ============================================================ */
async function refreshData(){
  try{
    allSites = await loadAllSites();
    allSites.sort((a,b)=>{
      const ea = evaluate(a).state, eb = evaluate(b).state;
      const rank = s => s==="issue" ? 0 : s==="stale" ? 1 : 2;
      if(rank(ea) !== rank(eb)) return rank(ea)-rank(eb);
      return a.name.localeCompare(b.name, "th");
    });
    paginate();
    buildDots();
    renderPage(currentPage);
    renderRibbon();
    renderFooter();
    document.getElementById("loading").style.display = "none";
    document.getElementById("errorBox").style.display = "none";
    document.getElementById("grid").style.display = "grid";
    document.getElementById("footerBox").style.display = "flex";
    resetRotateTimer();
  }catch(err){
    console.error(err);
    document.getElementById("loading").style.display = "none";
    document.getElementById("grid").style.display = "none";
    document.getElementById("footerBox").style.display = "none";
    document.getElementById("errorBox").style.display = "flex";
  }
}

refreshData();
setInterval(refreshData, DATA_REFRESH_MS);
</script>
</body>
