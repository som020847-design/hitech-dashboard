<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>HI-TECH ECO ENERGY — Solar Monitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="ระบบมอนิเตอร์พลังงานโซลาร์แบบเรียลไทม์ของ Hi-Tech Eco Energy ดูกำลังผลิต สถานะ และแจ้งเตือนของทุกไซต์ในเครือได้ในหน้าเดียว">
<meta property="og:title" content="HI-TECH ECO ENERGY — Solar Monitoring">
<meta property="og:description" content="ระบบมอนิเตอร์พลังงานโซลาร์แบบเรียลไทม์ — ดูกำลังผลิต สถานะ และแจ้งเตือนของทุกไซต์ในเครือได้ในหน้าเดียว">
<meta property="og:type" content="website">
<style>
  :root{
    --cream:#fffaf3;
    --panel:#ffffff;
    --ink:#2b1706;
    --sub:#9a8672;
    --line:#f3e6d5;
    --orange:#ff7a1a;
    --orange-deep:#e85d04;
    --gold:#f5a23e;
    --gold-soft:#fdead2;
    --amber-soft:#fff1de;
    --ok:#2fb35d;
    --ok-soft:#e6f7ec;
    --issue:#ff4d3d;
    --issue-soft:#ffe9e5;
    --stale:#9a9a9e;
    --stale-soft:#f2f0eb;
    --v-huawei:#ff7a1a;
    --v-deye:#f5a23e;
    --v-sigen:#e85d04;
    --deep:#2a1002;
    --deep2:#4a1d02;
    --header-ink:#2b1706;
    --header-sub:#9a8672;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI","Noto Sans Thai",sans-serif;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    height:100vh;
    -webkit-font-smoothing:antialiased;
    position:relative;
  }

  /* ---------- Realistic minimal sunlight glow (light mode only) ---------- */
  #sunGlow{
    position:fixed;inset:0;z-index:-2;pointer-events:none;overflow:hidden;
  }
  body.dark-mode #sunGlow{display:none;}
  #sunGlow .sun-core{
    position:absolute;top:-14%;right:8%;width:440px;height:440px;border-radius:50%;
    background:radial-gradient(circle,
      rgba(255,246,228,.95) 0%,
      rgba(255,228,180,.55) 32%,
      rgba(255,208,148,.2) 55%,
      transparent 72%);
    filter:blur(8px);
    animation:sunPulseSoft 6s ease-in-out infinite;
  }
  #sunGlow .beam{
    position:absolute;top:-25%;right:14%;width:640px;height:1300px;
    background:linear-gradient(180deg, rgba(255,230,185,.28) 0%, transparent 68%);
    transform-origin:top center;
    filter:blur(22px);
  }
  #sunGlow .beam.b1{transform:rotate(16deg);opacity:.85;}
  #sunGlow .beam.b2{transform:rotate(34deg);opacity:.5;width:520px;}
  @keyframes sunPulseSoft{0%,100%{opacity:.92;}50%{opacity:1;}}

  #leafLayer{
    position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;
  }
  body.dark-mode #leafLayer{display:none;}
  .leaf-piece{
    position:absolute;top:-40px;font-size:22px;opacity:.55;
    animation-name:leafFall,leafSway;
    animation-timing-function:linear,ease-in-out;
    animation-iteration-count:infinite,infinite;
    filter:drop-shadow(0 2px 3px rgba(90,50,0,.15));
  }
  @keyframes leafFall{from{transform:translateY(-40px) rotate(0deg);}to{transform:translateY(110vh) rotate(360deg);}}
  @keyframes leafSway{0%,100%{margin-left:0;}50%{margin-left:60px;}}

  /* ---------- Header: dark floating capsule navbar ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:20px 34px 16px;
    padding:9px 14px 9px 22px;
    flex-shrink:0;
    background:rgba(255,255,255,.72);
    backdrop-filter:blur(22px) saturate(160%);
    -webkit-backdrop-filter:blur(22px) saturate(160%);
    border:1px solid rgba(255,255,255,.6);
    border-radius:999px;
    box-shadow:0 16px 36px rgba(150,80,20,.16), inset 0 1px 0 rgba(255,255,255,.8);
    position:relative;
    z-index:30;
  }
  .brand{display:flex;align-items:center;gap:12px;position:relative;}
  .brand img.logo{
    height:36px;width:auto;display:block;flex-shrink:0;
    filter:drop-shadow(0 2px 5px rgba(150,80,20,.15));
  }
  .header-right{display:flex;align-items:center;gap:12px;position:relative;}
  #clock{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;text-align:right;color:var(--header-ink);}
  #clock small{display:block;font-size:10.5px;font-weight:500;color:var(--header-sub);margin-top:1px;}
  #pauseBtn{
    border:none;
    background:linear-gradient(180deg, var(--gold) 0%, var(--orange-deep) 100%);
    color:#fff;
    padding:10px 19px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;
    display:flex;align-items:center;gap:7px;
    box-shadow:0 6px 16px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .28s cubic-bezier(.34,1.56,.64,1), box-shadow .22s ease, background .22s ease;
  }
  #pauseBtn:hover{transform:translateY(-2px) scale(1.04);}
  #pauseBtn:active{transform:translateY(0) scale(.96);transition-duration:.12s;}

  /* ---------- Search button + dropdown ---------- */
  #searchToggleBtn{
    border:none;background:linear-gradient(180deg, var(--gold) 0%, var(--orange-deep) 100%);color:#fff;
    width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:15px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 6px 16px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .28s cubic-bezier(.34,1.56,.64,1), box-shadow .22s ease;
  }
  #searchToggleBtn:hover{transform:translateY(-2px) scale(1.08) rotate(-6deg);}
  #searchToggleBtn:active{transform:scale(.92) rotate(0deg);transition-duration:.12s;}
  #darkModeToggle{
    border:none;background:linear-gradient(180deg, var(--gold) 0%, var(--orange-deep) 100%);color:#fff;
    width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:16px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 6px 16px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .28s cubic-bezier(.34,1.56,.64,1), box-shadow .22s ease;
  }
  #darkModeToggle:hover{transform:translateY(-2px) scale(1.08);}
  #darkModeToggle:active{transform:scale(.92);transition-duration:.12s;}
  #searchBar{
    position:absolute;top:calc(100% + 12px);right:0;
    display:none;align-items:center;gap:10px;
    width:300px;max-width:calc(100vw - 40px);
    background:#ffffff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px 16px;
    box-shadow:0 20px 44px rgba(40,20,0,.3);
    z-index:200;
  }
  #searchBar.show{display:flex;}
  #searchIcon{font-size:14px;opacity:.6;flex-shrink:0;}
  #searchInput{
    flex:1;border:none;outline:none;background:transparent;
    font-family:inherit;font-size:14px;color:var(--ink);
  }
  #searchInput::placeholder{color:var(--sub);}
  #searchClear{
    border:none;background:var(--stale-soft);color:var(--sub);
    width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:11px;flex-shrink:0;
    transition:transform .22s cubic-bezier(.34,1.56,.64,1), background .15s ease;
  }
  #searchClear:hover{background:var(--line);transform:scale(1.12);}
  #searchClear:active{transform:scale(.9);}
  #searchNoResults{
    display:none;flex:1;align-items:center;justify-content:center;
    color:var(--sub);font-size:14px;padding:40px;
  }

  /* ---------- Ribbon: floating gold/orange chip pill ---------- */
  #ribbon{
    flex-shrink:0;
    background:linear-gradient(120deg, var(--gold) 0%, var(--orange-deep) 100%);
    color:#fff;
    display:none;
    align-items:center;
    margin:0 34px 16px;
    padding:12px 22px;
    font-size:13.5px;
    font-weight:700;
    letter-spacing:.1px;
    overflow:hidden;
    white-space:nowrap;
    position:relative;
    z-index:5;
    border-radius:999px;
    box-shadow:0 12px 28px rgba(190,90,0,.35), inset 0 1px 0 rgba(255,255,255,.35);
  }
  #ribbon.show{display:flex;}
  #ribbon .siren{
    flex-shrink:0;margin-right:13px;width:9px;height:9px;border-radius:50%;
    background:#fff;
    box-shadow:0 0 0 0 rgba(255,255,255,.7);
    animation: dotPulse 1.6s ease-out infinite;
  }
  #ribbonTrack{display:inline-flex;gap:34px;animation:scroll 24s linear infinite;color:#fff;}
  #ribbonTrack span{cursor:pointer;text-decoration:underline;text-decoration-color:rgba(255,255,255,.5);text-underline-offset:3px;}
  #ribbonTrack span:hover{text-decoration-color:#fff;}
  @keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  @keyframes dotPulse{
    0%{box-shadow:0 0 0 0 rgba(255,255,255,.6);}
    70%{box-shadow:0 0 0 9px rgba(255,255,255,0);}
    100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}
  }

  /* ---------- Main grid ---------- */
  main{
    flex:1;
    padding:14px 34px 6px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    grid-auto-rows:1fr;
    gap:16px;
    overflow:hidden;
    isolation:isolate;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:20px;
    padding:16px 16px 13px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    min-height:230px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.8) inset,
      0 2px 4px rgba(30,20,0,.04),
      0 14px 28px rgba(30,20,0,.10);
    position:relative;
    overflow:hidden;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{
    transform:translateY(-5px);
    box-shadow:
      0 1px 0 rgba(255,255,255,.8) inset,
      0 2px 4px rgba(30,20,0,.05),
      0 20px 38px rgba(30,20,0,.16);
  }
  .card.issue{
    border-color:#ffcec5;
    animation:pulse 2s ease-in-out infinite;
  }
  .card.warning{
    border-color:#ffe1a0;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(255,77,61,.28);}
    50%{box-shadow:0 0 0 8px rgba(255,77,61,0);}
  }
  .card.muted{opacity:1;}
  .vendor-chip-badge{
    position:absolute;top:14px;right:14px;
    font-size:9.5px;font-weight:800;color:#fff;
    padding:3px 9px;border-radius:999px;
    letter-spacing:.2px;
    box-shadow:0 3px 8px rgba(0,0,0,.18);
  }
  .vendor-chip-badge.Huawei{background:linear-gradient(135deg,#ff9d4d,var(--v-huawei));}
  .vendor-chip-badge.Deye{background:linear-gradient(135deg,#ffcb7a,var(--v-deye));}
  .vendor-chip-badge.Sigen{background:linear-gradient(135deg,#ff8a5c,var(--v-sigen));}
  .card.has-banner .vendor-chip-badge{top:44px;}
  .card.has-banner .card-top{margin-top:2px;}

  .card-alert-banner{
    margin:-16px -16px 12px;
    padding:8px 16px 8px 14px;
    display:flex;align-items:center;gap:7px;
    font-size:11px;font-weight:700;color:#fff;
  }
  .card-alert-banner .banner-dot{
    width:6px;height:6px;border-radius:50%;background:#fff;flex-shrink:0;
    box-shadow:0 0 0 0 rgba(255,255,255,.7);
    animation:dotPulse 1.6s ease-out infinite;
  }
  .card-alert-banner .banner-text{
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .card-alert-banner.banner-issue{background:linear-gradient(90deg,#ff5a45,#e8281c);}
  .card-alert-banner.banner-warning{background:linear-gradient(90deg,var(--gold),var(--orange-deep));}
  .card-alert-banner.banner-offline{background:linear-gradient(90deg,#9a9a9e,#6b6b6f);}

  .card-top{padding-right:56px;}
  .site-name{
    font-size:15px;font-weight:700;line-height:1.28;color:var(--ink);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }

  .stats{display:flex;gap:10px;margin-top:10px;}
  .stat{
    flex:1;
    background:linear-gradient(180deg, #fff8ec 0%, var(--amber-soft) 100%);
    border-radius:14px;
    padding:11px 8px;text-align:center;
    min-width:0;
    box-shadow:
      0 1px 0 rgba(255,255,255,.9) inset,
      0 -2px 0 rgba(122,68,0,.06) inset,
      0 3px 7px rgba(122,68,0,.08);
  }
  .stat .val{
    font-size:17px;font-weight:800;color:#7a4400;font-variant-numeric:tabular-nums;
    white-space:nowrap;line-height:1.15;
  }
  .stat .lbl{font-size:10px;color:#a8752e;margin-top:3px;font-weight:600;line-height:1.3;}
  .stat .lbl .unit{font-weight:500;opacity:.85;}
  .card.issue .stat .lbl .unit{opacity:.85;}
  .card.issue .stat{background:linear-gradient(180deg, #fff0ee 0%, var(--issue-soft) 100%);}
  .card.issue .stat .val{color:#a8281c;}
  .card.issue .stat .lbl{color:#c14d40;}
  .card.warning .stat{background:linear-gradient(180deg, #fff8e6 0%, var(--gold-soft) 100%);}
  .card.warning .stat .val{color:#8a6100;}
  .card.warning .stat .lbl{color:#a37a1e;}

  .stats.stats-3 .stat .val{font-size:14.5px;}
  .stats.stats-3 .stat{padding:10px 6px;}

  .card-bottom{
    display:flex;justify-content:space-between;align-items:center;margin-top:10px;
  }
  .status-pill{
    font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;
    display:flex;align-items:center;gap:5px;
  }
  .status-pill .dot{width:7px;height:7px;border-radius:50%;}
  .status-pill.ok{background:var(--ok-soft);color:#186b38;}
  .status-pill.ok .dot{background:var(--ok);}
  .status-pill.issue{background:var(--issue-soft);color:#a8281c;}
  .status-pill.issue .dot{background:var(--issue);}
  .status-pill.warning{background:var(--gold-soft);color:#8a6100;}
  .status-pill.warning .dot{background:var(--gold);}
  .status-pill.stale{background:var(--stale-soft);color:#6b6b6f;}
  .status-pill.stale .dot{background:var(--stale);}
  .updated{font-size:10px;color:var(--sub);font-weight:500;}

  /* ---------- Footer ---------- */
  footer{
    flex-shrink:0;
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 34px 20px;
  }
  .totals{display:flex;gap:24px;font-size:12px;color:var(--sub);font-weight:500;}
  .totals b{color:var(--ink);font-size:14px;font-weight:700;}
  .dots{display:flex;gap:7px;}
  .dots span{width:8px;height:8px;border-radius:50%;background:var(--line);transition:.25s;cursor:pointer;}
  .dots span.active{background:var(--orange);width:22px;border-radius:5px;}

  #loading, #errorBox{
    flex:1;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:10px;color:var(--sub);font-size:15px;text-align:center;padding:0 40px;
  }
  #errorBox{display:none;color:#a8281c;}
  #errorBox code{background:var(--gold-soft);padding:2px 6px;border-radius:6px;font-size:13px;}

  /* ---------- Detail modal ---------- */
  #modalOverlay{
    display:none;position:fixed;inset:0;background:rgba(30,22,10,.45);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    z-index:50;align-items:center;justify-content:center;padding:30px;
  }
  #modalOverlay.show{display:flex;}
  #modalBox{
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-radius:24px;max-width:680px;width:100%;
    max-height:86vh;overflow-y:auto;overflow-x:hidden;padding:28px 30px;position:relative;
    box-shadow:0 24px 60px rgba(40,25,0,.25);
    border:1px solid rgba(255,255,255,.6);
  }
  #modalClose{
    position:absolute;top:18px;right:18px;background:var(--stale-soft);border:none;
    width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;color:var(--sub);
    transition:background .12s ease;
  }
  #modalClose:hover{background:var(--line);}
  .modal-header{display:flex;align-items:center;flex-wrap:wrap;gap:8px 10px;margin-bottom:4px;padding-right:40px;}
  .modal-header h2{font-size:20px;margin:0;font-weight:800;}
  .vendor-chip{
    font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:999px;color:#fff;flex-shrink:0;
  }
  .vendor-chip.Huawei{background:var(--v-huawei);}
  .vendor-chip.Deye{background:var(--v-deye);}
  .vendor-chip.Sigen{background:var(--v-sigen);}
  .modal-sub{font-size:12px;color:var(--sub);margin-bottom:18px;font-weight:500;}
  .modal-hero{
    position:relative;
    margin:-28px -30px 18px;
    height:150px;
    border-radius:24px 24px 0 0;
    background-size:cover;background-position:center;
    display:flex;align-items:flex-end;
    padding:18px 30px 14px;
    overflow:hidden;
  }
  .modal-hero::before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(30,15,0,.1) 0%, rgba(20,10,0,.8) 100%);
  }
  .modal-hero .modal-header, .modal-hero .modal-sub{position:relative;z-index:1;margin:0;}
  .modal-hero .modal-header h2{color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.4);}
  .modal-hero .modal-sub{color:rgba(255,255,255,.85);margin-top:4px;}
  .modal-hero-inner{display:flex;flex-direction:column;gap:2px;}

  .icon-stat-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
  .icon-stat{
    flex:1 1 150px;background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:12px 14px;display:flex;align-items:center;gap:10px;
    box-shadow:0 4px 12px rgba(30,20,0,.05);
  }
  .icon-stat .icon-bubble{
    width:38px;height:38px;border-radius:50%;flex-shrink:0;color:#fff;font-size:16px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 8px rgba(0,0,0,.15);
  }
  .icon-stat .icon-info{min-width:0;}
  .icon-stat .icon-info .v{font-size:16px;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .icon-stat .icon-info .l{font-size:10.5px;color:var(--sub);font-weight:600;margin-top:1px;}

  .gauge-section{display:flex;justify-content:center;margin:6px 0 20px;}
  .gauge-wrap{text-align:center;}
  .gauge-wrap .gauge-caption{font-size:11px;color:var(--sub);font-weight:600;margin-top:4px;}
  .modal-section-title{font-size:12px;font-weight:700;color:var(--sub);margin:20px 0 8px;text-transform:uppercase;letter-spacing:.5px;}
  .detail-rows{display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:14px;overflow:hidden;}
  .detail-row{
    display:flex;justify-content:space-between;padding:11px 14px;background:var(--panel);font-size:13px;
  }
  .detail-row .k{color:var(--sub);font-weight:500;}
  .detail-row .v{font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}
  .device-card{
    background:var(--amber-soft);border-radius:14px;padding:12px 14px;margin-bottom:8px;font-size:12.5px;
  }
  .device-card .dname{font-weight:700;color:#7a4400;margin-bottom:5px;font-size:13px;}
  .device-card .drow{display:flex;justify-content:space-between;color:#8a6224;padding:2px 0;}
  .device-card .drow b{color:#5c4114;}
  .alarm-card{
    background:var(--issue-soft);border-radius:14px;padding:14px 16px;margin-bottom:10px;
  }
  .alarm-card .aname{font-weight:700;color:#a8281c;font-size:14px;margin-bottom:4px;}
  .alarm-card .arow{font-size:12px;color:#7a3a30;margin-top:6px;line-height:1.5;}
  .alarm-card .arow b{color:#5c2a20;}
  .no-alarm-note{
    background:var(--ok-soft);color:#186b38;border-radius:14px;padding:14px 16px;font-size:13px;font-weight:500;
  }
  .heuristic-note{
    background:var(--stale-soft);color:#6b6b6f;border-radius:14px;padding:12px 14px;font-size:11.5px;margin-top:10px;line-height:1.5;
  }

  /* ---------- Mobile ---------- */
  @media (max-width:700px){
    body{overflow-y:auto;height:auto;min-height:100vh;}
    header{flex-direction:row;align-items:center;justify-content:space-between;gap:10px;margin:14px 16px 10px;padding:10px 14px;}
    .brand{gap:8px;}
    .brand img.logo{height:22px;}
    .brand h1{font-size:14.5px;line-height:1.25;}
    .brand span{display:none;}
    .header-right{width:auto;justify-content:flex-end;}
    #clock{font-size:12.5px;text-align:right;}
    #clock small{font-size:9px;}
    #pauseBtn{display:none;}
    #ribbon{margin:0 16px 10px;padding:10px 16px;font-size:12px;}
    #searchBar{right:0;width:260px;}
    #loading,#errorBox{padding:40px 24px;font-size:14px;text-align:center;}
    main{
      grid-template-columns:repeat(2,1fr);
      grid-auto-rows:auto;
      padding:6px 18px 12px;
      overflow:visible;
      gap:12px;
    }
    .card{padding:14px 14px 12px;}
    .card:hover{transform:none;}
    .site-name{font-size:14px;}
    .stats{gap:8px;}
    .stat{padding:9px 6px;}
    .stat .val{font-size:15px;}
    .stat .lbl{font-size:9px;}
    .stats.stats-3 .stat .val{font-size:12.5px;}
    .status-pill{font-size:10px;padding:4px 8px;}
    .updated{font-size:9px;}
    footer{flex-direction:column;align-items:flex-start;gap:10px;padding:14px 18px 26px;}
    .totals{flex-wrap:wrap;gap:12px 18px;}
    .dots{display:none;}
    #modalOverlay{padding:14px;}
    #modalBox{padding:22px 18px;max-height:92vh;border-radius:20px;}
    .modal-header h2{font-size:17px;}
    .modal-stats .stat{flex:1 1 100px;}
  }

  /* ============================================================
     DARK MODE — EDM strobe theme
     Flash rate kept under ~2.5 flashes/sec (period >=400ms) and uses
     color/hue shifts rather than full black/white luminance strobing,
     to stay clear of the ~3Hz photosensitive-seizure danger zone.
     ============================================================ */
  body.dark-mode{
    --cream:#070510;
    --panel:#231a42;
    --ink:#f3edff;
    --sub:#b6a6dd;
    --line:#4a3a7a;
    --amber-soft:#2e2350;
    --ok-soft:#123322;
    --issue-soft:#3a1030;
    --stale-soft:#2b2248;
    --gold-soft:#332654;
  }
  body.dark-mode{
    background:
      radial-gradient(1200px 700px at 10% 0%, rgba(255,0,200,.18) 0%, transparent 55%),
      radial-gradient(1000px 600px at 95% 10%, rgba(0,230,255,.16) 0%, transparent 50%),
      radial-gradient(900px 600px at 50% 100%, rgba(160,0,255,.16) 0%, transparent 55%),
      var(--cream);
    animation: edmHueShift 6s linear infinite;
  }
  @keyframes edmHueShift{
    0%{filter:hue-rotate(0deg);}
    100%{filter:hue-rotate(360deg);}
  }
  body.dark-mode header{
    background:rgba(20,14,35,.65);
    border:1px solid rgba(255,60,220,.4);
    box-shadow:0 0 22px rgba(255,40,210,.45), 0 0 44px rgba(0,220,255,.25), inset 0 1px 0 rgba(255,255,255,.06);
    animation: edmBorderFlash .45s steps(1) infinite;
  }
  @keyframes edmBorderFlash{
    0%,100%{box-shadow:0 0 22px rgba(255,40,210,.5), 0 0 44px rgba(0,220,255,.28), inset 0 1px 0 rgba(255,255,255,.06);}
    50%{box-shadow:0 0 26px rgba(0,220,255,.55), 0 0 50px rgba(255,40,210,.32), inset 0 1px 0 rgba(255,255,255,.06);}
  }
  body.dark-mode .brand img.logo{filter:drop-shadow(0 0 10px rgba(255,60,220,.7)) drop-shadow(0 0 18px rgba(0,220,255,.4));}
  body.dark-mode #clock, body.dark-mode .brand h1{color:#fff;}
  body.dark-mode #pauseBtn, body.dark-mode #searchToggleBtn, body.dark-mode #darkModeToggle{
    background:linear-gradient(135deg,#ff2fd6,#7b2fff 50%,#00e6ff);
    box-shadow:0 0 14px rgba(255,40,210,.6), 0 0 24px rgba(0,220,255,.35);
  }
  body.dark-mode #ribbon{
    background:linear-gradient(120deg,#ff2fd6,#7b2fff,#00e6ff,#ff2fd6);
    background-size:300% 100%;
    color:#fff;
    animation: edmRibbonSweep 1.6s linear infinite, edmRibbonFlash .4s steps(1) infinite;
  }
  @keyframes edmRibbonSweep{from{background-position:0% 0;}to{background-position:300% 0;}}
  @keyframes edmRibbonFlash{
    0%,100%{box-shadow:0 0 20px rgba(255,40,210,.55), inset 0 1px 0 rgba(255,255,255,.3);}
    50%{box-shadow:0 0 34px rgba(0,220,255,.7), inset 0 1px 0 rgba(255,255,255,.4);}
  }
  body.dark-mode .card{
    background:linear-gradient(165deg, #2b2150 0%, var(--panel) 100%);
    border:1.5px solid rgba(180,150,255,.35);
    box-shadow:0 0 0 1px rgba(0,0,0,.3), 0 2px 4px rgba(0,0,0,.5), 0 16px 34px rgba(0,0,0,.6), 0 0 20px rgba(123,47,255,.18);
  }
  body.dark-mode .card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg,#ff2fd6,#00e6ff,#ffee00,#ff2fd6);
    background-size:300% 100%;
    animation: edmCardSweep 1.4s linear infinite, edmCardFlash .5s steps(1) infinite;
  }
  @keyframes edmCardSweep{from{background-position:0% 0;}to{background-position:300% 0;}}
  @keyframes edmCardFlash{0%,100%{opacity:.75;}50%{opacity:1;}}
  body.dark-mode .stat{
    background:linear-gradient(180deg, #1e1735 0%, var(--amber-soft) 100%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 3px 10px rgba(0,0,0,.35);
  }
  body.dark-mode .stat .val{color:#00e6ff;text-shadow:0 0 8px rgba(0,220,255,.6);}
  body.dark-mode .stat .lbl{color:#d6a6ff;}
  body.dark-mode .card.issue .stat .val{color:#ff5ac8;text-shadow:0 0 8px rgba(255,40,210,.7);}
  body.dark-mode .card.warning .stat .val{color:#ffee55;text-shadow:0 0 8px rgba(255,230,50,.6);}
  body.dark-mode .site-name{color:#fff;}
  body.dark-mode .updated{color:#8a7ab0;}
  body.dark-mode .status-pill.ok{background:#0f2e20;color:#4dffb0;}
  body.dark-mode .status-pill.ok .dot{background:#4dffb0;box-shadow:0 0 6px #4dffb0;}
  body.dark-mode .status-pill.issue{background:#3a1030;color:#ff5ac8;}
  body.dark-mode .status-pill.issue .dot{background:#ff5ac8;box-shadow:0 0 6px #ff5ac8;}
  body.dark-mode .status-pill.warning{background:#3a2f0a;color:#ffee55;}
  body.dark-mode .status-pill.warning .dot{background:#ffee55;box-shadow:0 0 6px #ffee55;}
  body.dark-mode .status-pill.stale{background:#221c38;color:#a698c8;}
  body.dark-mode #searchBar{background:#181229;border-color:var(--line);}
  body.dark-mode #searchInput{color:#fff;}
  body.dark-mode .totals, body.dark-mode #loading{color:#b6a6dd;}
  body.dark-mode .totals b{color:#fff;}
  body.dark-mode .dots span{background:var(--line);}
  body.dark-mode .dots span.active{background:#ff2fd6;box-shadow:0 0 8px #ff2fd6;}
  body.dark-mode #modalBox{background:rgba(22,16,39,.94);border-color:var(--line);}
  body.dark-mode .detail-row{background:var(--panel);}
  body.dark-mode .detail-row .v{color:#fff;}
  body.dark-mode .device-card, body.dark-mode .no-alarm-note, body.dark-mode .heuristic-note{background:var(--amber-soft);color:#d6c6ff;}
  body.dark-mode .icon-stat{background:var(--panel);border-color:var(--line);}
  body.dark-mode .icon-stat .icon-info .v{color:#fff;}
  body.dark-mode .gauge-wrap svg text{fill:#fff !important;}

  /* ============================================================
     PARTY MODE UPGRADE — full rainbow, confetti, disco ball 🎉
     Flash rate still capped ~2.5/sec on brightness; the extra motion
     (spin/float/wiggle) is safe since it's not luminance strobing.
     ============================================================ */
  #discoBall{
    display:none;position:fixed;top:14px;left:50%;transform:translateX(-50%);
    font-size:30px;z-index:100;pointer-events:none;
    animation: discoSpin 2.2s linear infinite, discoBob 1.1s ease-in-out infinite;
    filter:drop-shadow(0 0 14px rgba(255,255,255,.8));
  }
  body.dark-mode #discoBall{display:block;}
  @keyframes discoSpin{from{transform:translateX(-50%) rotate(0deg);}to{transform:translateX(-50%) rotate(360deg);}}
  @keyframes discoBob{0%,100%{margin-top:0;}50%{margin-top:8px;}}

  #confettiLayer{
    display:none;position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden;
  }
  body.dark-mode #confettiLayer{display:block;}
  .confetti-piece{
    position:absolute;top:-20px;
    width:8px;height:14px;
    opacity:.85;
    animation-name: confettiFall, confettiSway;
    animation-timing-function: linear, ease-in-out;
    animation-iteration-count: infinite, infinite;
  }
  @keyframes confettiFall{from{transform:translateY(-20px) rotate(0deg);}to{transform:translateY(110vh) rotate(720deg);}}
  @keyframes confettiSway{0%,100%{margin-left:0;}50%{margin-left:40px;}}

  body.dark-mode{
    background:
      radial-gradient(1200px 700px at 10% 0%, rgba(255,0,200,.22) 0%, transparent 55%),
      radial-gradient(1000px 600px at 95% 10%, rgba(0,230,255,.2) 0%, transparent 50%),
      radial-gradient(900px 600px at 50% 100%, rgba(160,0,255,.2) 0%, transparent 55%),
      radial-gradient(800px 500px at 80% 90%, rgba(255,230,0,.14) 0%, transparent 50%),
      var(--cream);
    animation: edmHueShift 4s linear infinite;
  }
  body.dark-mode .brand h1, body.dark-mode #clock{
    background:linear-gradient(90deg,#ff2fd6,#ffee00,#00e6ff,#7b2fff,#ff2fd6);
    background-size:300% auto;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation: rainbowText 2.5s linear infinite;
  }
  @keyframes rainbowText{from{background-position:0% 0;}to{background-position:300% 0;}}
  body.dark-mode #pauseBtn, body.dark-mode #searchToggleBtn, body.dark-mode #darkModeToggle{
    background:linear-gradient(135deg,#ff2fd6,#ffee00 33%,#00e6ff 66%,#7b2fff);
    background-size:300% 300%;
    animation: rainbowShift 1.8s linear infinite, wiggle 1.4s ease-in-out infinite;
  }
  @keyframes rainbowShift{from{background-position:0% 0;}to{background-position:300% 300%;}}
  @keyframes wiggle{0%,100%{rotate:0deg;}25%{rotate:-8deg;}75%{rotate:8deg;}}
  body.dark-mode .card::before{
    background:linear-gradient(90deg,#ff2fd6,#ffee00,#00e6ff,#7b2fff,#ff2fd6);
    height:5px;
  }
  body.dark-mode .card:hover{
    transform:translateY(-6px) scale(1.02) rotate(-.4deg);
  }
  body.dark-mode .vendor-chip-badge{
    animation: rainbowShift 2s linear infinite;
    background:linear-gradient(135deg,#ff2fd6,#00e6ff) !important;
    background-size:200% 200%;
  }
  body.dark-mode #ribbon .siren, body.dark-mode .card-alert-banner .banner-dot{
    animation: dotPulse 1.6s ease-out infinite, wiggle .5s ease-in-out infinite;
  }
</style>
</head>

const DATA_REFRESH_MS = 5 * 60000;

function gvizUrl(sheetName){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
}

/* ============================================================
   CSV PARSER
   ============================================================ */
function parseCSV(text){
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], n = text[i+1];
    if(inQuotes){
      if(c === '"' && n === '"'){ field += '"'; i++; }
      else if(c === '"'){ inQuotes = false; }
      else{ field += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ row.push(field); field=""; }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=""; }
      else if(c === '\r'){ /* skip */ }
      else{ field += c; }
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  if(!rows.length) return [];
  const headers = rows[0].map(h=>h.trim());
  return rows.slice(1).filter(r=>r.length>1 || r[0]!=="").map(r=>{
    const o = {};
    headers.forEach((h,idx)=> o[h] = (r[idx]!==undefined ? r[idx].trim() : ""));
    return o;
  });
}

async function fetchSheet(sheetName){
  const res = await fetch(gvizUrl(sheetName));
  if(!res.ok) throw new Error(`โหลด ${sheetName} ไม่สำเร็จ (${res.status})`);
  const text = await res.text();
  return parseCSV(text);
}

function num(v){
  if(v === undefined || v === null || v === "") return null;
  const n = parseFloat(v);
  return isNaN(n) ? null : n;
}

function latestByKey(rows, keyField){
  const map = new Map();
  for(const r of rows){
    if(!r[keyField]) continue;
    map.set(r[keyField], r);
  }
  return [...map.values()];
}

function parseTimestamp(s){
  if(!s) return null;
  const d = new Date(s.replace(" ", "T"));
  return isNaN(d.getTime()) ? null : d;
}

/* ============================================================
   โหลดและรวมข้อมูลทุกแหล่ง
   ============================================================ */
async function loadAllSites(){
  const [
    huaweiLatest, huaweiStations, huaweiAlarmsRaw,
    deyeAll, deyeStations, deyeDeviceStatus, deyeAlertsRaw, deyeDailyEnergy,
    sigenInvAll, sigenRealtimeAll, sigenStations, sigenDeviceList
  ] = await Promise.all([
    fetchSheet("Latest_Data"),
    fetchSheet("Station_List").catch(()=>[]),
    fetchSheet("Huawei_Alarms").catch(() => []),
    fetchSheet("Deye_Realtime_Data"),
    fetchSheet("Deye_Station_List").catch(()=>[]),
    fetchSheet("Deye_Device_Status").catch(()=>[]),
    fetchSheet("Deye_Alerts").catch(()=>[]),
    fetchSheet("Deye_Daily_Energy").catch(()=>[]),
    fetchSheet("Sigen_Inverter_Data"),
    fetchSheet("Sigen_Realtime_Data").catch(()=>[]),
    fetchSheet("Sigen_Station_List").catch(()=>[]),
    fetchSheet("Sigen_Device_List").catch(()=>[])
  ]);

  // ---- capacity lookup maps ----
  const huaweiCapMap = new Map(huaweiStations.map(r => [r.stationCode, num(r["capacity (kW)"])]));
  const deyeCapMap = new Map(deyeStations.map(r => [r.stationId, num(r.capacity_kW)]));
  const sigenCapMap = new Map(sigenStations.map(r => [r.systemId, {
    pv: num(r.pv_capacity_kW), battery: num(r.battery_capacity_kWh), status: r.status || ""
  }]));

  // ---- Huawei active alarms (latest polling batch, full detail) ----
  let latestHuaweiAlarmMap = new Map();
  if (huaweiAlarmsRaw.length){
    const times = huaweiAlarmsRaw.map(r => parseTimestamp(r.timestamp_polled)).filter(Boolean);
    if (times.length){
      const latestTime = Math.max(...times.map(d => d.getTime()));
      const latestStr = huaweiAlarmsRaw.find(r => {
        const t = parseTimestamp(r.timestamp_polled);
        return t && t.getTime() === latestTime;
      })?.timestamp_polled;

      huaweiAlarmsRaw
        .filter(r => r.timestamp_polled === latestStr)
        .forEach(r => {
          const key = r.stationCode;
          if (!key) return;
          if (!latestHuaweiAlarmMap.has(key)) latestHuaweiAlarmMap.set(key, []);
          latestHuaweiAlarmMap.get(key).push({
            name: r.alarmName || "Alarm",
            device: r.deviceName || "",
            severity: r.alarmSeverity || "",
            occurTime: r.occurTime || "",
            cause: r.raw_json ? tryExtractCause(r.raw_json) : ""
          });
        });
    }
  }
  function tryExtractCause(raw){
    try{
      const m = raw.match(/"alarmCause"\s*:\s*"([^"]*)"/);
      return m ? m[1] : "";
    }catch(e){ return ""; }
  }

  // ---- Deye: latest daily energy / self-use savings snapshot per station ----
  const deyeDailyLatest = latestByKey(deyeDailyEnergy, "stationId");
  const deyeDailyMap = new Map(deyeDailyLatest.map(r => [r.stationId, r]));

  // ---- Deye: history of active power per station (to detect *sustained* zero, not momentary) ----
  const deyeHistoryMap = new Map();
  for(const r of deyeAll){
    if(!r.stationId) continue;
    const t = parseTimestamp(r.timestamp);
    if(!t) continue;
    if(!deyeHistoryMap.has(r.stationId)) deyeHistoryMap.set(r.stationId, []);
    deyeHistoryMap.get(r.stationId).push({t:t.getTime(), val:num(r.active_power_kW)});
  }
  for(const arr of deyeHistoryMap.values()) arr.sort((a,b)=>a.t-b.t);

  // ---- Deye: per-device connectStatus (real connectivity signal, same as Deye Cloud's own
  // Online / Partially Offline / Offline classification) grouped by stationId ----
  const deyeDeviceMap = new Map();
  for(const r of deyeDeviceStatus){
    if(!r.stationId) continue;
    if(!deyeDeviceMap.has(r.stationId)) deyeDeviceMap.set(r.stationId, []);
    deyeDeviceMap.get(r.stationId).push({
      type: r.deviceType || "Device",
      sn: r.deviceSn || "",
      connected: String(r.connectStatus) === "1",
      lastSeen: r.collectionTime || ""
    });
  }

  // ---- Deye: real active alerts from /station/alertList (latest polling batch only) ----
  let latestDeyeAlertMap = new Map();
  if (deyeAlertsRaw.length){
    const times = deyeAlertsRaw.map(r => parseTimestamp(r.timestamp_polled)).filter(Boolean);
    if (times.length){
      const latestTime = Math.max(...times.map(d => d.getTime()));
      const latestStr = deyeAlertsRaw.find(r => {
        const t = parseTimestamp(r.timestamp_polled);
        return t && t.getTime() === latestTime;
      })?.timestamp_polled;

      deyeAlertsRaw
        .filter(r => r.timestamp_polled === latestStr && r.stationId)
        .forEach(r => {
          if (!latestDeyeAlertMap.has(r.stationId)) latestDeyeAlertMap.set(r.stationId, []);
          latestDeyeAlertMap.get(r.stationId).push({
            name: r.alertName || "Alert",
            deviceType: r.deviceType || "",
            impact: String(r.impact) === "1",
            level: r.level || "",
            startTime: r.alertStartTime || ""
          });
        });
    }
  }

  // ---- Sigen: per-device raw status (from /system/{id}/devices, same field
  // Sigen Cloud's own "Devices" tab uses) — kept as-is for reference in the detail modal.
  // NOT used to drive alert state: exact raw string values from this field haven't been
  // confirmed yet, so we show it verbatim rather than guessing "online"/"offline" from it. ----
  const sigenDeviceMap = new Map();
  for(const r of sigenDeviceList){
    if(!r.systemId) continue;
    if(!sigenDeviceMap.has(r.systemId)) sigenDeviceMap.set(r.systemId, []);
    sigenDeviceMap.get(r.systemId).push({
      type: r.deviceType || "Device",
      sn: r.serialNumber || "",
      rawStatus: r.status || ""
    });
  }

  // ---- Sigen: history of total PV power per system (sum of devices at each timestamp) ----
  const sigenTsPower = new Map();
  for(const r of sigenInvAll){
    if(!r.systemId || !r.timestamp) continue;
    const t = parseTimestamp(r.timestamp);
    if(!t) continue;
    if(!sigenTsPower.has(r.systemId)) sigenTsPower.set(r.systemId, new Map());
    const m = sigenTsPower.get(r.systemId);
    const tk = t.getTime();
    m.set(tk, (m.get(tk)||0) + (num(r.pv_power_kW) || 0));
  }
  const sigenHistoryMap = new Map();
  for(const [key, m] of sigenTsPower){
    sigenHistoryMap.set(key, [...m.entries()].map(([t,val])=>({t,val})).sort((a,b)=>a.t-b.t));
  }

  const sites = [];

  // ---- Huawei ----
  for(const r of huaweiLatest){
    if(!r.stationCode) continue;
    sites.push({
      vendor:"Huawei",
      id:r.stationCode,
      name:r.stationName || r.stationCode,
      lastUpdated:parseTimestamp(r.timestamp),
      activeAlarms: latestHuaweiAlarmMap.get(r.stationCode) || [],
      capacityKw: huaweiCapMap.get(r.stationCode) ?? null,
      rawStatus: r.status || "",
      metrics:{
        dayPower: num(r.day_power),
        monthPower: num(r.month_power),
        totalPower: num(r.total_power),
        dayUse: num(r.day_use),
        dayGrid: num(r.day_grid),
        dayIncome: num(r.day_income),
        totalIncome: num(r.total_income),
        savedCost: num(r.saved_cost)
      },
      livePowerKw:null
    });
  }

  // ---- Deye ----
  const deyeLatest = latestByKey(deyeAll, "stationId");
  for(const r of deyeLatest){
    sites.push({
      vendor:"Deye",
      id:r.stationId,
      name:r.stationName || r.stationId,
      lastUpdated:parseTimestamp(r.timestamp),
      activeAlarms: [],
      capacityKw: deyeCapMap.get(r.stationId) ?? null,
      livePowerKw: num(r.active_power_kW),
      powerHistory: deyeHistoryMap.get(r.stationId) || [],
      deviceStatusList: deyeDeviceMap.get(r.stationId) || [],
      deviceAlerts: latestDeyeAlertMap.get(r.stationId) || [],
      metrics:{
        activePower: num(r.active_power_kW),
        consumptionPower: num(r.consumption_power_kW),
        wirePower: num(r.wire_power_kW),
        batteryPower: num(r.battery_power_kW),
        batterySoc: num(r.battery_soc_pct),
        dayGeneration: num((deyeDailyMap.get(r.stationId)||{}).day_generation_kWh),
        daySelfUse: num((deyeDailyMap.get(r.stationId)||{}).day_self_use_kWh),
        dayPurchase: num((deyeDailyMap.get(r.stationId)||{}).day_purchase_kWh),
        dayGrid: num((deyeDailyMap.get(r.stationId)||{}).day_grid_kWh),
        savedCost: num((deyeDailyMap.get(r.stationId)||{}).saved_cost)
      }
    });
  }

  // ---- Sigen: aggregate live power across devices per systemId ----
  const sigenRealtimeLatest = latestByKey(sigenRealtimeAll, "systemId");
  const sigenRealtimeMap = new Map(sigenRealtimeLatest.map(r => [r.systemId, r]));

  const bySystem = new Map();
  for(const r of sigenInvAll){
    if(!r.systemId) continue;
    const key = r.systemId;
    if(!bySystem.has(key)){
      bySystem.set(key, {
        vendor:"Sigen", id:key, name:r.systemName || key,
        livePowerKw:0, lastUpdated:null, activeAlarms: [], devices:[],
        capacityKw: (sigenCapMap.get(key)||{}).pv ?? null,
        powerHistory: sigenHistoryMap.get(key) || [],
        metrics:{}
      });
    }
    const s = bySystem.get(key);
    const p = num(r.pv_power_kW);
    if(p !== null) s.livePowerKw += p;
    const t = parseTimestamp(r.timestamp);
    if(t && (!s.lastUpdated || t > s.lastUpdated)) s.lastUpdated = t;
    s.devices.push({
      type:r.deviceType || "Device",
      status:r.status || "",
      activePower:num(r.active_power_kW),
      pvPower:num(r.pv_power_kW),
      reactivePower:num(r.reactive_power_kW),
      powerFactor:num(r.power_factor),
      gridFreq:num(r.grid_frequency_Hz),
      temp:num(r.internal_temperature_C)
    });
  }
  for(const [key, s] of bySystem){
    const rt = sigenRealtimeMap.get(key);
    if(rt){
      s.metrics = {
        dayEnergy: num(rt.daily_power_generation_kWh),
        monthEnergy: num(rt.monthly_power_generation),
        annualEnergy: num(rt.annual_power_generation),
        lifetimeEnergy: num(rt.lifetime_power_generation),
        lifetimeCo2: num(rt.lifetime_co2_ton),
        lifetimeTree: num(rt.lifetime_tree_equivalent),
        savedCost: num(rt.saved_cost)
      };
    }
    const cap = sigenCapMap.get(key) || {};
    s.batteryCapacityKw = cap.battery ?? null;
    s.sigenStatus = cap.status || "";
    s.sigenDeviceStatusList = sigenDeviceMap.get(key) || [];
    sites.push(s);
  }

  return sites;
}

/* ============================================================
   ตัดสิน "ปัญหา"
   ============================================================ */

// states: "ok" | "fault" (confirmed device/vendor fault) | "offline" (no/stale data or comms alarm) | "partial" (some devices disconnected) | "warning" (non-critical alert)
function evaluate(site){
  const now = new Date();

  if(!site.lastUpdated){
    return {state:"offline", reason:"ไม่มีข้อมูล"};
  }
  const ageMin = (now - site.lastUpdated) / 60000;
  if(ageMin > STALE_MIN){
    return {state:"offline", reason:`ข้อมูลล่าช้า ${Math.round(ageMin)} นาที`};
  }

  if(site.vendor === "Huawei"){
    if(site.activeAlarms && site.activeAlarms.length){
      const names = site.activeAlarms.map(a=>a.name).join(", ");
      const isOfflineType = site.activeAlarms.some(a => /connection|communication|network|offline|disconnect/i.test(a.name||""));
      return {state: isOfflineType ? "offline" : "fault", reason:names};
    }
    return {state:"ok", reason:""};
  }

  // Sigen: use the system-level status field from Sigen's own /system endpoint
  // (already fetched into Sigen_Station_List — same categories shown in Sigen Cloud's
  // own UI tabs: Normal / Faulty / External Issue / Offline / Power-off / Standby).
  // This needs no MQTT connection at all, unlike device-level alarms.
  // NOTE: per-device connectivity (sigenDeviceStatusList) is intentionally NOT used to
  // drive status here — we haven't confirmed the exact raw string Sigen's API returns
  // for a device's "status" field, and guessing caused false "disconnected" positives
  // on systems Sigen itself reports as Normal. It's still shown for reference in the
  // detail modal, just not used for alerting until confirmed.
  if(site.vendor === "Sigen" && site.sigenStatus){
    const norm = site.sigenStatus.toLowerCase().replace(/[\s-]/g, "");
    if(norm === "faulty"){
      return {state:"fault", reason:`Sigen รายงานสถานะ: ${site.sigenStatus}`};
    }
    if(norm === "offline"){
      return {state:"offline", reason:`Sigen รายงานสถานะ: ${site.sigenStatus}`};
    }
    if(norm === "externalissue"){
      return {state:"warning", reason:`Sigen รายงานสถานะ: ${site.sigenStatus}`};
    }
    if(norm === "poweroff"){
      return {state:"offline", reason:`ระบบถูกปิด (${site.sigenStatus})`};
    }
    // "Normal" / "Standby" fall through to the normal ok checks below
  }

  const raw = (site.devices ? site.devices.map(d=>d.status).join(" ") : (site.metrics.status||"")).toLowerCase();
  if(raw.includes("fault") || raw.includes("alarm")){
    return {state:"fault", reason:"สถานะผิดปกติ"};
  }

  // Deye: real active alerts from station/alertList (most authoritative signal we have)
  if(site.vendor === "Deye" && site.deviceAlerts && site.deviceAlerts.length){
    const faultAlerts = site.deviceAlerts.filter(a => a.impact);
    if(faultAlerts.length){
      return {state:"fault", reason: faultAlerts.map(a=>a.name).join(", ")};
    }
    return {state:"warning", reason: site.deviceAlerts.map(a=>a.name).join(", ")};
  }

  // Deye: real per-device connectStatus (matches Deye Cloud's own Online/Partially Offline/Offline)
  if(site.vendor === "Deye" && site.deviceStatusList && site.deviceStatusList.length){
    const total = site.deviceStatusList.length;
    const connected = site.deviceStatusList.filter(d => d.connected).length;
    if(connected === 0){
      return {state:"offline", reason:"อุปกรณ์ทั้งหมดขาดการเชื่อมต่อ (Offline)"};
    }
    if(connected < total){
      const names = site.deviceStatusList.filter(d=>!d.connected).map(d=>d.type).join(", ");
      return {state:"partial", reason:`${names} ขาดการเชื่อมต่อ (${connected}/${total} เชื่อมต่ออยู่)`};
    }
  }

  return {state:"ok", reason:""};
}

function pillInfo(ev){
  if(ev.state === "ok") return {cls:"ok", text:"ปกติ"};
  if(ev.state === "fault") return {cls:"issue", text:"ผิดพลาด"};
  if(ev.state === "issue") return {cls:"issue", text:"ต้องตรวจสอบ"};
  if(ev.state === "warning") return {cls:"warning", text:"แจ้งเตือน"};
  if(ev.state === "partial") return {cls:"warning", text:"เชื่อมต่อไม่ครบ"};
  if(ev.state === "offline") return {cls:"stale", text:"ออฟไลน์"};
  return {cls:"stale", text:"ไม่ทราบสถานะ"};
}

/* ============================================================
   สร้างสถิติสำหรับการ์ดหลัก (เฉพาะที่มีข้อมูลจริง)
   ============================================================ */
function fmtNum(n, digits=2){
  if(n===null || n===undefined) return null;
  return n.toFixed(digits);
}

function fmtSmart(n){
  if(n===null || n===undefined) return null;
  const a = Math.abs(n);
  if(a < 1) return n.toFixed(3);
  if(a < 10) return n.toFixed(2);
  if(a < 100) return n.toFixed(1);
  return n.toFixed(0);
}

function cardStats(site){
  const list = [];
  if(site.vendor === "Huawei"){
    if(site.metrics.dayPower !== null) list.push({label:"ผลผลิตวันนี้", val:fmtSmart(site.metrics.dayPower), unit:"kWh"});
    if(site.capacityKw !== null) list.push({label:"กำลังติดตั้ง", val:fmtSmart(site.capacityKw), unit:"kW"});
    if(site.metrics.savedCost !== null) list.push({label:"ประหยัดวันนี้", val:fmtSmart(site.metrics.savedCost), unit:"บาท"});
    return list.slice(0,3);
  } else if(site.vendor === "Deye"){
    if(site.livePowerKw !== null) list.push({label:"กำลังไฟ", val:fmtSmart(site.livePowerKw), unit:"kW"});
    if(site.capacityKw !== null) list.push({label:"กำลังติดตั้ง", val:fmtSmart(site.capacityKw), unit:"kW"});
    if(site.metrics.savedCost !== null && site.metrics.savedCost !== undefined) list.push({label:"ประหยัดวันนี้", val:fmtSmart(site.metrics.savedCost), unit:"บาท"});
    return list.slice(0,3);
  } else if(site.vendor === "Sigen"){
    if(site.livePowerKw !== null) list.push({label:"กำลังไฟ", val:fmtSmart(site.livePowerKw), unit:"kW"});
    if(site.capacityKw !== null) list.push({label:"กำลังติดตั้ง (PV)", val:fmtSmart(site.capacityKw), unit:"kW"});
    if(site.metrics.savedCost !== null && site.metrics.savedCost !== undefined) list.push({label:"ประหยัดวันนี้", val:fmtSmart(site.metrics.savedCost), unit:"บาท"});
    return list.slice(0,3);
  }
  return list.slice(0,2);
}

function relTime(d){
  if(!d) return "-";
  const min = Math.round((new Date() - d)/60000);
  if(min < 1) return "เมื่อสักครู่";
  if(min < 60) return `${min} นาทีที่แล้ว`;
  return `${Math.round(min/60)} ชม.ที่แล้ว`;
}

/* ============================================================
   RENDER — GRID
   ============================================================ */
let PAGES = [];
let currentPage = 0;
let rotateTimer = null;
let paused = false;
let allSites = [];

function buildCard(site){
  const ev = evaluate(site);
  const stats = cardStats(site);
  const pill = pillInfo(ev);

  const statsHtml = stats.length
    ? `<div class="stats${stats.length>=3?' stats-3':''}">${stats.map(s=>`<div class="stat"><div class="val">${s.val}</div><div class="lbl">${s.label}<span class="unit"> (${s.unit})</span></div></div>`).join("")}</div>`
    : `<div class="stats"><div class="stat"><div class="val" style="font-size:13px;color:var(--sub);">ยังไม่มีข้อมูล</div></div></div>`;

  const bannerCls = (ev.state === "fault" || ev.state === "issue") ? "banner-issue"
    : (ev.state === "warning" || ev.state === "partial") ? "banner-warning"
    : (ev.state === "offline") ? "banner-offline" : "";
  const bannerHtml = (bannerCls && ev.reason)
    ? `<div class="card-alert-banner ${bannerCls}"><span class="banner-dot"></span><span class="banner-text">${ev.reason}</span></div>`
    : "";

  const card = document.createElement("div");
  card.className = "card" + (bannerCls ? " has-banner" : "") + (ev.state === "fault" || ev.state === "issue" ? " issue" : "") + (ev.state === "partial" || ev.state === "warning" ? " warning" : "");
  card.innerHTML = `
    ${bannerHtml}
    <div class="vendor-chip-badge ${site.vendor}">${site.vendor}</div>
    <div class="card-top">
      <div class="site-name">${site.name}</div>
    </div>
    ${statsHtml}
    <div class="card-bottom">
      <div class="status-pill ${pill.cls}"><span class="dot"></span>${pill.text}</div>
      <div class="updated">${relTime(site.lastUpdated)}</div>
    </div>
  `;
  card.addEventListener("click", () => openDetail(site));
  return card;
}

function renderPage(idx){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const page = PAGES[idx] || [];
  page.forEach(site => grid.appendChild(buildCard(site)));
  document.querySelectorAll("#dots span").forEach((d,i)=>d.classList.toggle("active", i===idx));
}

function buildDots(){
  const dots = document.getElementById("dots");
  dots.innerHTML = "";
  PAGES.forEach((_,i)=>{
    const d = document.createElement("span");
    d.onclick = ()=>{ currentPage = i; renderPage(currentPage); resetRotateTimer(); };
    dots.appendChild(d);
  });
}

function renderRibbon(){
  const ribbon = document.getElementById("ribbon");
  const track = document.getElementById("ribbonTrack");
  const issues = allSites.map(s=>({site:s, ev:evaluate(s)})).filter(x=>x.ev.state==="fault" || x.ev.state==="issue" || x.ev.state==="partial" || x.ev.state==="warning");
  if(!issues.length){ ribbon.classList.remove("show"); return; }
  ribbon.classList.add("show");
  track.innerHTML = "";
  const doubled = [...issues, ...issues];
  doubled.forEach(x=>{
    const span = document.createElement("span");
    const tag = x.ev.state === "fault" ? "ผิดพลาด" : x.ev.state === "partial" ? "เชื่อมต่อไม่ครบ" : x.ev.state === "warning" ? "แจ้งเตือน" : "ต้องตรวจสอบ";
    span.textContent = `${x.site.name} [${tag}] — ${x.ev.reason}`;
    span.addEventListener("click", ()=> openDetail(x.site));
    track.appendChild(span);
  });
}

function renderFooter(){
  const totalPower = allSites.reduce((a,s)=> a + (s.livePowerKw || 0), 0);
  const issueCount = allSites.filter(s=>{const st=evaluate(s).state; return st==="fault"||st==="issue"||st==="partial"||st==="warning";}).length;
  const offlineCount = allSites.filter(s=>evaluate(s).state==="offline").length;
  document.getElementById("totSites").textContent = allSites.length;
  document.getElementById("totPower").textContent = totalPower.toFixed(1);
  document.getElementById("totIssue").textContent = issueCount;
  document.getElementById("totStale").textContent = offlineCount;
  document.getElementById("totRefresh").textContent = new Date().toLocaleTimeString("th-TH");
}

function isMobileView(){
  return window.matchMedia("(max-width:700px)").matches;
}

let searchQuery = "";

function paginate(){
  const filtered = searchQuery
    ? allSites.filter(s => s.name.toLowerCase().includes(searchQuery) || s.id.toLowerCase().includes(searchQuery))
    : allSites;

  document.getElementById("searchNoResults").style.display = (searchQuery && !filtered.length) ? "flex" : "none";
  document.getElementById("grid").style.display = (searchQuery && !filtered.length) ? "none" : "grid";

  if(searchQuery || isMobileView()){
    PAGES = [filtered];
  } else {
    PAGES = [];
    for(let i=0;i<filtered.length;i+=PAGE_SIZE){
      PAGES.push(filtered.slice(i, i+PAGE_SIZE));
    }
  }
  if(!PAGES.length) PAGES = [[]];
  currentPage = Math.min(currentPage, PAGES.length-1);
}

function resetRotateTimer(){
  clearInterval(rotateTimer);
  if(paused || isMobileView() || searchQuery || PAGES.length <= 1) return;
  rotateTimer = setInterval(()=>{
    currentPage = (currentPage+1) % PAGES.length;
    renderPage(currentPage);
  }, ROTATE_MS);
}

document.getElementById("pauseBtn").addEventListener("click", ()=>{
  paused = !paused;
  document.getElementById("pauseBtn").textContent = paused ? "▶ เล่นต่อ" : "⏸ หยุดเลื่อน";
  resetRotateTimer();
});

const searchInput = document.getElementById("searchInput");
const searchClear = document.getElementById("searchClear");
searchInput.addEventListener("input", ()=>{
  searchQuery = searchInput.value.trim().toLowerCase();
  searchClear.style.display = searchQuery ? "block" : "none";
  if(!allSites.length) return;
  paginate();
  buildDots();
  currentPage = 0;
  renderPage(currentPage);
  resetRotateTimer();
});
searchClear.addEventListener("click", ()=>{
  searchInput.value = "";
  searchQuery = "";
  searchClear.style.display = "none";
  if(!allSites.length) return;
  paginate();
  buildDots();
  currentPage = 0;
  renderPage(currentPage);
  resetRotateTimer();
});

/* ============================================================
   DETAIL MODAL — ข้อมูลเชิงลึกต่อไซต์
   ============================================================ */
function row(k,v,unit){
  if(v===null || v===undefined) return "";
  return `<div class="detail-row"><div class="k">${k}</div><div class="v">${v}${unit?` ${unit}`:""}</div></div>`;
}

function buildDetailBody(site){
  let html = "";
  if(site.vendor === "Huawei"){
    const m = site.metrics;
    html += `<div class="modal-section-title">ผลผลิตพลังงาน</div><div class="detail-rows">`;
    html += row("ผลผลิตวันนี้", fmtNum(m.dayPower,2), "kWh");
    html += row("ผลผลิตเดือนนี้", fmtNum(m.monthPower,1), "kWh");
    html += row("ผลผลิตสะสมทั้งหมด", fmtNum(m.totalPower,1), "kWh");
    html += row("กำลังการผลิตติดตั้ง", fmtNum(site.capacityKw,3), "kW");
    html += `</div>`;

    html += `<div class="modal-section-title">การใช้ไฟ / รายได้</div><div class="detail-rows">`;
    html += row("ใช้เองวันนี้", fmtNum(m.dayUse,2), "kWh");
    html += row("ขายเข้าระบบวันนี้", fmtNum(m.dayGrid,2), "kWh");
    html += row("รายได้วันนี้", fmtNum(m.dayIncome,2), "บาท");
    html += row("รายได้สะสม", fmtNum(m.totalIncome,2), "บาท");
    html += row("ประหยัดวันนี้", fmtNum(m.savedCost,2), "บาท");
    html += `</div>`;

    if(site.activeAlarms && site.activeAlarms.length){
      html += `<div class="modal-section-title">Alarm ที่กำลัง Active (${site.activeAlarms.length})</div>`;
      site.activeAlarms.forEach(a=>{
        html += `
          <div class="alarm-card">
            <div class="aname">${a.name}${a.severity ? " · " + a.severity : ""}</div>
            ${a.device ? `<div class="arow"><b>อุปกรณ์:</b> ${a.device}</div>` : ""}
            ${a.occurTime ? `<div class="arow"><b>เวลาที่เกิด:</b> ${a.occurTime}</div>` : ""}
            ${a.cause ? `<div class="arow"><b>สาเหตุ:</b> ${a.cause}</div>` : ""}
          </div>`;
      });
    } else {
      html += `<div class="modal-section-title">Alarm</div><div class="no-alarm-note">ไม่มี alarm active อยู่ตอนนี้</div>`;
    }

  } else if(site.vendor === "Deye"){
    const m = site.metrics;
    html += `<div class="modal-section-title">พลังงานตอนนี้</div><div class="detail-rows">`;
    html += row("กำลังไฟที่ผลิต", fmtNum(m.activePower,2), "kW");
    html += row("กำลังไฟที่ใช้", fmtNum(m.consumptionPower,2), "kW");
    html += row("ซื้อ/ขายไฟกับการไฟฟ้า", fmtNum(m.wirePower,2), "kW");
    html += row("กำลังไฟแบตเตอรี่", fmtNum(m.batteryPower,2), "kW");
    html += row("ระดับแบตเตอรี่", fmtNum(m.batterySoc,0), "%");
    html += row("กำลังการผลิตติดตั้ง", fmtNum(site.capacityKw,1), "kW");
    html += `</div>`;

    html += `<div class="modal-section-title">พลังงานวันนี้ (kWh)</div><div class="detail-rows">`;
    html += row("ผลผลิตวันนี้", fmtNum(m.dayGeneration,2), "kWh");
    html += row("ใช้เองวันนี้ (โดยประมาณ)", fmtNum(m.daySelfUse,2), "kWh");
    html += row("ซื้อไฟจากการไฟฟ้าวันนี้", fmtNum(m.dayPurchase,2), "kWh");
    html += row("ขายเข้าระบบวันนี้", fmtNum(m.dayGrid,2), "kWh");
    html += row("ประหยัดวันนี้", fmtNum(m.savedCost,2), "บาท");
    html += `</div>`;

    if(site.deviceAlerts && site.deviceAlerts.length){
      html += `<div class="modal-section-title">Alert ที่กำลัง Active (${site.deviceAlerts.length})</div>`;
      site.deviceAlerts.forEach(a=>{
        html += `
          <div class="alarm-card" style="${a.impact ? '' : 'background:var(--gold-soft);'}">
            <div class="aname" style="${a.impact ? '' : 'color:#7a5a00;'}">${a.name}${a.impact ? ' · กระทบการผลิต' : ' · ไม่กระทบการผลิต'}</div>
            ${a.deviceType ? `<div class="arow" style="${a.impact ? '' : 'color:#8a6224;'}"><b>อุปกรณ์:</b> ${a.deviceType}</div>` : ""}
            ${a.startTime ? `<div class="arow" style="${a.impact ? '' : 'color:#8a6224;'}"><b>เริ่มเกิด:</b> ${a.startTime}</div>` : ""}
          </div>`;
      });
    } else {
      html += `<div class="modal-section-title">Alert</div><div class="no-alarm-note">ไม่มี alert active อยู่ตอนนี้ (ข้อมูลจาก Deye Alert API จริง)</div>`;
    }

    if(site.deviceStatusList && site.deviceStatusList.length){
      html += `<div class="modal-section-title">สถานะการเชื่อมต่ออุปกรณ์ (${site.deviceStatusList.length})</div>`;
      site.deviceStatusList.forEach(d=>{
        html += `<div class="device-card">
          <div class="dname">${d.type}</div>
          <div class="drow"><span>สถานะ</span><b style="color:${d.connected ? '#186b38' : '#a8281c'}">${d.connected ? 'เชื่อมต่ออยู่' : 'ขาดการเชื่อมต่อ'}</b></div>
          ${d.lastSeen ? `<div class="drow"><span>เห็นข้อมูลล่าสุด</span><b>${d.lastSeen}</b></div>` : ""}
        </div>`;
      });
    }

    const ev = evaluate(site);
    if(ev.state === "issue" || ev.state === "fault" || ev.state === "partial" || ev.state === "warning"){
      html += `<div class="modal-section-title">สถานะที่ตรวจพบ</div><div class="alarm-card"><div class="aname">${ev.reason}</div></div>`;
    }
    html += `<div class="heuristic-note">ℹ️ "Alert" และ "เชื่อมต่อไม่ครบ/ออฟไลน์" มาจากข้อมูลจริงของ Deye (Alert API + connectStatus รายอุปกรณ์) เท่านั้น ไม่มีการเดาสถานะจากค่ากำลังไฟอีกต่อไป<br>ℹ️ "ใช้เองวันนี้"/"ประหยัดวันนี้" คำนวณจาก (ใช้ไฟรวมวันนี้ − ซื้อไฟจากการไฟฟ้าวันนี้) x 4.5 บาท/kWh จากข้อมูล /station/history ของ Deye</div>`;

  } else if(site.vendor === "Sigen"){
    const m = site.metrics;
    html += `<div class="modal-section-title">ผลผลิตพลังงาน</div><div class="detail-rows">`;
    html += row("กำลังไฟตอนนี้", fmtNum(site.livePowerKw,2), "kW");
    html += row("ผลผลิตวันนี้", fmtNum(m.dayEnergy,2), "kWh");
    html += row("ผลผลิตเดือนนี้", fmtNum(m.monthEnergy,1), "kWh");
    html += row("ผลผลิตปีนี้", fmtNum(m.annualEnergy,1), "kWh");
    html += row("ผลผลิตสะสมทั้งหมด", fmtNum(m.lifetimeEnergy,1), "kWh");
    html += row("กำลังการผลิตติดตั้ง (PV)", fmtNum(site.capacityKw,2), "kW");
    html += row("ความจุแบตเตอรี่", fmtNum(site.batteryCapacityKw,2), "kWh");
    html += row("ประหยัดวันนี้ (โดยประมาณ)", fmtNum(m.savedCost,2), "บาท");
    if(site.sigenStatus) html += row("สถานะจาก Sigen Cloud", site.sigenStatus, "");
    html += `</div>`;

    if(m.lifetimeCo2 !== null || m.lifetimeTree !== null){
      html += `<div class="modal-section-title">ผลกระทบต่อสิ่งแวดล้อม (สะสม)</div><div class="detail-rows">`;
      html += row("ลด CO₂", fmtNum(m.lifetimeCo2,2), "ตัน");
      html += row("เทียบเท่าปลูกต้นไม้", fmtNum(m.lifetimeTree,1), "ต้น");
      html += `</div>`;
    }

    if(site.devices && site.devices.length){
      html += `<div class="modal-section-title">อุปกรณ์ในระบบ (${site.devices.length})</div>`;
      site.devices.forEach(d=>{
        const statusEntry = (site.sigenDeviceStatusList||[]).find(x => x.type === d.type);
        html += `<div class="device-card">
          <div class="dname">${d.type}${d.status ? " · " + d.status : ""}</div>
          ${statusEntry && statusEntry.rawStatus ? `<div class="drow"><span>สถานะ (จาก Sigen)</span><b>${statusEntry.rawStatus}</b></div>` : ""}
          ${d.activePower!==null?`<div class="drow"><span>กำลังไฟ</span><b>${fmtNum(d.activePower,2)} kW</b></div>`:""}
          ${d.pvPower!==null?`<div class="drow"><span>กำลังไฟจากแผง</span><b>${fmtNum(d.pvPower,2)} kW</b></div>`:""}
          ${d.temp!==null?`<div class="drow"><span>อุณหภูมิ</span><b>${fmtNum(d.temp,1)} °C</b></div>`:""}
          ${d.gridFreq!==null?`<div class="drow"><span>ความถี่ไฟฟ้า</span><b>${fmtNum(d.gridFreq,2)} Hz</b></div>`:""}
        </div>`;
      });
    }

    const ev = evaluate(site);
    if(ev.state === "issue" || ev.state === "fault"){
      html += `<div class="modal-section-title">สถานะที่ตรวจพบ</div><div class="alarm-card"><div class="aname">${ev.reason}</div></div>`;
    }
    html += `<div class="heuristic-note">ℹ️ สถานะ (ปกติ/ผิดพลาด/ออฟไลน์) มาจากข้อมูลจริงของ Sigen (ฟิลด์ status จาก /system endpoint เดียวกับที่ Sigen Cloud ใช้แสดงในหน้า System ของเว็บเขาเอง) รวมถึงสถานะการเชื่อมต่อรายอุปกรณ์จาก /devices endpoint ด้วย<br>⚠️ รายละเอียด alarm เจาะจง (เช่น ชื่อ error โค้ด สาเหตุ) ยังต้องรอเชื่อมต่อ MQTT subscription แบบ real-time ถึงจะดึงมาได้ — ยืนยันจากเอกสาร Sigen ว่า alarm data มีให้ผ่าน MQTT เท่านั้น ไม่มี REST endpoint ให้ poll<br>ℹ️ "ประหยัดวันนี้" คำนวณจากผลผลิตรวมทั้งหมด x 4.5 บาท/kWh (ไม่ได้แยกว่าใช้เองเท่าไหร่ ขายเข้าระบบเท่าไหร่ เพราะ Sigen API ไม่ได้แยกให้)</div>`;
  }
  return html;
}

function statIcon(label){
  if(label.includes("ผลผลิต")) return {icon:"☀️", bg:"linear-gradient(135deg,#ffb347,#ff7a1a)"};
  if(label.includes("กำลังไฟ") && !label.includes("ติดตั้ง")) return {icon:"⚡", bg:"linear-gradient(135deg,#f5a23e,#e85d04)"};
  if(label.includes("ติดตั้ง")) return {icon:"🔧", bg:"linear-gradient(135deg,#c8a27a,#8a6b4a)"};
  if(label.includes("ประหยัด")) return {icon:"💰", bg:"linear-gradient(135deg,#4fc27a,#2fb35d)"};
  return {icon:"📊", bg:"linear-gradient(135deg,#f5a23e,#e85d04)"};
}

function buildIconStatRow(stats){
  return `<div class="icon-stat-row">${stats.map(s=>{
    const {icon,bg} = statIcon(s.label);
    return `<div class="icon-stat">
      <div class="icon-bubble" style="background:${bg}">${icon}</div>
      <div class="icon-info">
        <div class="v">${s.val} <span style="font-size:11px;font-weight:600;opacity:.7;">${s.unit}</span></div>
        <div class="l">${s.label}</div>
      </div>
    </div>`;
  }).join("")}</div>`;
}

function buildGauge(percent, valueText, label){
  const r=52, c=2*Math.PI*r;
  const pct = Math.min(Math.max(percent,0),100);
  const dash = c*pct/100;
  return `<div class="gauge-section"><div class="gauge-wrap">
    <svg viewBox="0 0 140 140" width="140" height="140">
      <defs><linearGradient id="gaugeGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#f5a23e"/><stop offset="100%" stop-color="#e85d04"/>
      </linearGradient></defs>
      <circle cx="70" cy="70" r="${r}" fill="none" stroke="var(--line)" stroke-width="13"/>
      <circle cx="70" cy="70" r="${r}" fill="none" stroke="url(#gaugeGrad)" stroke-width="13"
        stroke-linecap="round" stroke-dasharray="${dash} ${c}" transform="rotate(-90 70 70)"/>
      <text x="70" y="65" text-anchor="middle" font-size="21" font-weight="800" fill="#2b1706" font-family="inherit">${valueText}</text>
      <text x="70" y="84" text-anchor="middle" font-size="10" fill="#9a8672" font-family="inherit">${label}</text>
    </svg>
  </div></div>`;
}

function openDetail(site){
  paused = true;
  document.getElementById("pauseBtn").textContent = "▶ เล่นต่อ";
  resetRotateTimer();

  const stats = cardStats(site);
  const ev = evaluate(site);
  const pill = pillInfo(ev);

  const iconStatsHtml = buildIconStatRow(stats);

  // utilization gauge: only meaningful where we have both a live power reading and installed capacity
  let gaugeHtml = "";
  if(site.livePowerKw !== null && site.livePowerKw !== undefined && site.capacityKw){
    const pct = (site.livePowerKw / site.capacityKw) * 100;
    gaugeHtml = buildGauge(pct, pct.toFixed(0)+"%", "กำลังผลิต ณ ขณะนี้");
  }

  document.getElementById("modalContent").innerHTML = `
    <div class="modal-hero" style="background-image:url('${MODAL_HERO_IMG}')">
      <div class="modal-hero-inner">
        <div class="modal-header">
          <h2>${site.name}</h2>
          <div class="vendor-chip ${site.vendor}">${site.vendor}</div>
          <div class="status-pill ${pill.cls}"><span class="dot"></span>${pill.text}</div>
        </div>
        <div class="modal-sub">รหัสไซต์: ${site.id} · อัปเดตล่าสุด ${relTime(site.lastUpdated)}</div>
      </div>
    </div>
    ${iconStatsHtml}
    ${gaugeHtml}
    ${buildDetailBody(site)}
  `;
  document.getElementById("modalOverlay").classList.add("show");
}

function closeDetail(){
  document.getElementById("modalOverlay").classList.remove("show");
}
document.getElementById("modalClose").addEventListener("click", closeDetail);
document.getElementById("modalOverlay").addEventListener("click", (e)=>{
  if(e.target.id === "modalOverlay") closeDetail();
});
document.addEventListener("keydown", (e)=>{
  if(e.key === "Escape") closeDetail();
});

/* ============================================================
   CLOCK
   ============================================================ */
function tickClock(){
  const now = new Date();
  document.getElementById("clock").innerHTML =
    now.toLocaleTimeString("th-TH") +
    `<small>${now.toLocaleDateString("th-TH", {weekday:"long", day:"numeric", month:"long", year:"numeric"})}</small>`;
}
setInterval(tickClock, 1000);
tickClock();

/* ============================================================
   MAIN LOAD LOOP
   ============================================================ */
async function refreshData(){
  try{
    allSites = await loadAllSites();
    allSites.sort((a,b)=>{
      const ea = evaluate(a).state, eb = evaluate(b).state;
      const rank = s => s==="fault" ? 0 : s==="warning" ? 1 : s==="partial" ? 2 : s==="issue" ? 3 : s==="offline" ? 4 : 5;
      if(rank(ea) !== rank(eb)) return rank(ea)-rank(eb);
      return a.name.localeCompare(b.name, "th");
    });
    paginate();
    buildDots();
    renderPage(currentPage);
    renderRibbon();
    renderFooter();
    document.getElementById("loading").style.display = "none";
    document.getElementById("errorBox").style.display = "none";
    document.getElementById("grid").style.display = "grid";
    document.getElementById("footerBox").style.display = "flex";
    resetRotateTimer();
  }catch(err){
    console.error(err);
    document.getElementById("loading").style.display = "none";
    document.getElementById("grid").style.display = "none";
    document.getElementById("footerBox").style.display = "none";
    document.getElementById("errorBox").style.display = "flex";
  }
}

refreshData();
setInterval(refreshData, DATA_REFRESH_MS);

let resizeTimer;
window.addEventListener("resize", ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{
    if(!allSites.length) return;
    paginate();
    buildDots();
    renderPage(currentPage);
    resetRotateTimer();
  }, 250);
});
</script>
